<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker: Heavyweight Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #1e272e;
            --gold: #f1c40f;
            --chat-bg: #252a34;
            --buffet-color: #ff4757;
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: #1e272e;
            color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow: hidden;
        }

        #game-wrapper { 
            max-width: 1200px; width: 100%; display: flex; gap: 20px; padding: 20px; 
            box-sizing: border-box;
        }

        .clicker-section { 
            flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center;
        }

        #score-panel {
            background: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 20px;
            border: 3px solid var(--primary); margin-bottom: 20px; width: 100%;
            box-sizing: border-box; backdrop-filter: blur(10px);
        }

        #score-text { font-size: 3.5rem; color: var(--gold); margin: 0; line-height: 1; }

        #lincoln-main {
            width: 300px; height: 300px; border-radius: 50%; cursor: pointer;
            object-fit: cover; border: 8px solid var(--secondary);
            transition: transform 0.05s; user-select: none;
        }

        #lincoln-main:active { transform: scale(0.94); }
        .buffet-active { border-color: var(--buffet-color) !important; box-shadow: 0 0 20px var(--buffet-color); }

        .shop-container {
            flex: 1.2; background: rgba(255, 255, 255, 0.05); padding: 15px;
            border-radius: 20px; height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1);
        }

        .upgrade {
            width: 100%; background: #2f3542; border: 2px solid #444;
            border-radius: 12px; padding: 12px 18px; color: white; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; box-sizing: border-box; transition: 0.2s;
        }

        .upgrade:disabled { opacity: 0.3; filter: grayscale(1); }
        .can-afford { border-color: var(--gold) !important; background: #3e4452; }

        .u-info { text-align: left; }
        .u-name { font-weight: bold; color: #fab1a0; display: block; font-size: 1rem; }
        .u-cost { color: #55efc4; font-size: 0.9rem; }
        .u-count { font-size: 1.5rem; font-weight: bold; opacity: 0.6; }

        .prestige-btn {
            background: var(--gold); color: black; font-weight: bold; width: 100%;
            padding: 15px; border-radius: 12px; border: none; cursor: pointer; margin-top: 10px;
        }

        #chat-icon { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #chat-box { position: fixed; bottom: 90px; right: 20px; width: 320px; height: 450px; background: var(--chat-bg); border: 2px solid var(--primary); border-radius: 12px; display: none; flex-direction: column; z-index: 100; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.85rem; background: #1a1e26; }
        .msg { margin-bottom: 8px; line-height: 1.4; padding: 5px; border-radius: 4px; background: rgba(255,255,255,0.03); }
        .msg b { color: var(--secondary); }

        .particle { position: fixed; pointer-events: none; animation: flyUp 0.8s forwards; font-weight: bold; color: var(--gold); z-index: 999; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }

        #achievement-banner { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 25px; border-radius: 30px; font-weight: bold; display: none; z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="achievement-banner">Achievement Unlocked!</div>

<div id="game-wrapper">
    <div class="clicker-section">
        <div id="score-panel">
            <h1 id="score-text">0</h1>
            <p style="margin: 5px 0; letter-spacing: 2px; font-size: 0.8rem;">LINCOLN MASS</p>
            <div id="event-timer" style="color:var(--buffet-color); font-weight:bold; display:none; margin: 5px 0;">BUFFET RUSH: <span id="timer-sec">30</span>s</div>
            
            <div style="font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-top: 10px;">
                Per Click: <span id="stat-click">1</span> | Sec: <span id="stat-cps">0</span><br>
                Golden Tortas: <span id="stat-prestige" style="color:var(--gold)">0</span> (+<span id="stat-boost">0</span>%)
            </div>
            <div id="sync-status" style="font-size: 0.65rem; color: #777; margin-top: 8px;">Connecting...</div>
        </div>
        
        <img src="IMG_0668.jpg" id="lincoln-main" alt="Lincoln">
        
        <button class="prestige-btn" id="prestige-btn" style="display:none;" onclick="prestige()">
            WEIGH IN (Prestige)<br><small>Gain Golden Tortas & Reset</small>
        </button>

        <button onclick="resetGame()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer; font-size: 0.7rem; text-decoration: underline;">Hard Reset</button>
    </div>

    <div class="shop-container" id="shop"></div>
</div>

<div id="chat-icon" onclick="toggleChat()">💬</div>
<div id="chat-box">
    <div style="background:var(--primary); padding: 12px; font-weight: bold; display: flex; justify-content: space-between;">
        <span>Global Chat & King</span>
        <span onclick="toggleChat()" style="cursor:pointer;">×</span>
    </div>
    <div style="background: #000; padding: 5px; font-size: 0.7rem; color: var(--gold); text-align: center;" id="king-display">👑 Loading King...</div>
    <div id="chat-messages"></div>
    <div style="display:flex; padding:10px; background:#1e222b;">
        <input type="text" id="chat-msg-input" style="flex:1; background:#333; color:white; border:none; padding:8px; border-radius:5px;" placeholder="Press Enter to send..." onkeypress="if(event.key==='Enter') sendChat()">
    </div>
</div>

<script>
    const DB_URL = 'https://cnstrmbiosdykiqyxcua.supabase.co';
    const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc3RybWJpb3NkeWtpcXl4Y3VhIiwicm9sZES6ImFub24iLCJpYXQiOjE3NzMyMDEzMDEsImV4cCI6MjA4ODc3NzMwMX0.hf6kiAniU-Hw1J3xuYPK_xlUO9BLR3d5vkEq41uf8co';
    const _supabase = supabase.createClient(DB_URL, DB_KEY);

    let sessionId = localStorage.getItem('lincoln_session_id') || ('user_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('lincoln_session_id', sessionId);

    let energy = 0;
    let clickPower = 1;
    let cps = 0;
    let goldenTortas = 0;
    let isBuffetRush = false;
    let totalClicks = 0;
    let unlockedAchievements = [];
    let currentKing = "";
    let chatName = localStorage.getItem('chat_name') || "Anonymous";

    const upgrades = [
        { id: 0, name: "Extra Torta", cost: 15, power: 0.1, type: "click", count: 0 },
        { id: 1, name: "Chud Burger", cost: 100, power: 0.3, type: "cps", count: 0 },
        { id: 2, name: "The Lard-o-Meter", cost: 500, power: 0.8, type: "cps", count: 0 },
        { id: 3, name: "Bulk Season", cost: 1200, power: 0.6, type: "click", count: 0 },
        { id: 4, name: "Torta Pounder 3000", cost: 3000, power: 2.5, type: "cps", count: 0 },
        { id: 5, name: "Infinite Buffet Pass", cost: 10000, power: 7.0, type: "cps", count: 0 },
        { id: 6, name: "Chudmosis", cost: 25000, power: 15.0, type: "cps", count: 0 },
        { id: 7, name: "Deep Fried Top Hat", cost: 85000, power: 50.0, type: "cps", count: 0 },
        { id: 8, name: "Torta Transfusion", cost: 200000, power: 12, type: "click", count: 0 },
        { id: 9, name: "Gravy Shower", cost: 500000, power: 150, type: "cps", count: 0 },
        { id: 10, name: "Mega-Chud Transformation", cost: 2000000, power: 500, type: "cps", count: 0 },
        { id: 11, name: "The Giga-Torta", cost: 8000000, power: 1500, type: "cps", count: 0 },
        { id: 12, name: "Sumo Lincoln", cost: 40000000, power: 1200, type: "click", count: 0 },
        { id: 13, name: "Event Horizon Gut", cost: 150000000, power: 18000, type: "cps", count: 0 },
        { id: 14, name: "The Final Chud-down", cost: 2500000000, power: 120000, type: "cps", count: 0 }
    ];

    function initShop() {
        const shop = document.getElementById('shop'); shop.innerHTML = '';
        upgrades.forEach(u => {
            const btn = document.createElement('button');
            btn.className = 'upgrade'; btn.id = `up-${u.id}`;
            btn.onclick = () => buyUpgrade(u.id);
            btn.innerHTML = `
                <div class="u-info">
                    <span class="u-name">${u.name}</span>
                    <span class="u-cost" id="cost-${u.id}">${u.cost.toLocaleString()}</span> Mass
                </div>
                <div class="u-count" id="count-${u.id}">0</div>
            `;
            shop.appendChild(btn);
        });
    }

    function getBoost() { return 1 + (goldenTortas * 0.1); }

    document.getElementById('lincoln-main').addEventListener('click', (e) => {
        let val = clickPower * getBoost();
        if (isBuffetRush) val *= 10;
        if (currentKing !== "" && chatName !== currentKing) val *= 0.99;

        energy += val; totalClicks++;
        checkAchievements();
        showParticle(e.clientX, e.clientY, `+${val.toFixed(1)}`);
        updateUI();
    });

    function buyUpgrade(id) {
        const u = upgrades[id];
        if (energy >= u.cost) {
            energy -= u.cost; u.count++;
            if (u.type === "click") clickPower += u.power; else cps += u.power;
            u.cost = Math.ceil(u.cost * 1.35); 
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('score-text').innerText = Math.floor(energy).toLocaleString();
        document.getElementById('stat-click').innerText = (clickPower * getBoost() * (isBuffetRush ? 10 : 1)).toFixed(1);
        document.getElementById('stat-cps').innerText = (cps * getBoost()).toFixed(1);
        document.getElementById('stat-prestige').innerText = goldenTortas;
        document.getElementById('stat-boost').innerText = (goldenTortas * 10).toFixed(0);
        document.getElementById('prestige-btn').style.display = energy >= 1000000000 ? 'block' : 'none';

        upgrades.forEach(u => {
            const btn = document.getElementById(`up-${u.id}`);
            if (btn) {
                btn.disabled = energy < u.cost;
                energy >= u.cost ? btn.classList.add('can-afford') : btn.classList.remove('can-afford');
                document.getElementById(`cost-${u.id}`).innerText = u.cost.toLocaleString();
                document.getElementById(`count-${u.id}`).innerText = u.count;
            }
        });
    }

    async function cloudSave() {
        document.getElementById('sync-status').innerText = "Syncing...";
        // Save using the chatName set by the user
        await _supabase.from('leaderboard').upsert({ 
            username: chatName, 
            clicks: Math.floor(energy), 
            golden_tortas: goldenTortas, 
            achievements: unlockedAchievements.join(',') 
        }, { onConflict: 'username' });
        document.getElementById('sync-status').innerText = "Vaulted";
    }

    async function cloudLoad() {
        // Try to load by sessionId or chatName
        const { data } = await _supabase.from('leaderboard').select('*').eq('username', chatName).maybeSingle();
        if (data) {
            energy = data.clicks; goldenTortas = data.golden_tortas || 0;
            unlockedAchievements = data.achievements ? data.achievements.split(',') : [];
            updateUI();
        }
        document.getElementById('sync-status').innerText = "Vault Connected";
        fetchKing();
    }

    async function fetchKing() {
        const { data } = await _supabase.from('king_of_the_hill').select('*').maybeSingle();
        if (data) {
            currentKing = data.username;
            document.getElementById('king-display').innerText = `👑 Current King: ${data.username} (${data.clicks.toLocaleString()} Mass)`;
        }
    }

    function toggleChat() { 
        const b = document.getElementById('chat-box'); 
        b.style.display = b.style.display === 'flex' ? 'none' : 'flex';
        if (!localStorage.getItem('chat_name')) {
            const newName = prompt("Enter Chat Name:") || "Anonymous";
            chatName = newName;
            localStorage.setItem('chat_name', chatName);
            cloudSave(); // Sync name immediately
        }
        if(b.style.display === 'flex') fetchMessages();
    }

    async function sendChat() {
        const i = document.getElementById('chat-msg-input');
        if (!i.value) return;
        await _supabase.from('global_chat').insert([{ username: chatName, message: i.value }]);
        i.value = ""; fetchMessages();
    }

    async function fetchMessages() {
        const { data } = await _supabase.from('global_chat').select('*').order('created_at', { ascending: false }).limit(20);
        if (data) document.getElementById('chat-messages').innerHTML = data.reverse().map(m => `<div class="msg"><b>${m.username}:</b> ${m.message}</div>`).join('');
    }

    function showParticle(x, y, text) {
        const p = document.createElement('div'); p.className = 'particle'; p.innerText = text;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p); setTimeout(() => p.remove(), 800);
    }

    function checkAchievements() {
        const a = [
            { id: "steel", name: "Finger of Steel", req: totalClicks >= 1000 },
            { id: "mil", name: "Mass Millionaire", req: energy >= 1000000 }
        ];
        a.forEach(ach => {
            if (!unlockedAchievements.includes(ach.id) && ach.req) {
                unlockedAchievements.push(ach.id);
                const b = document.getElementById('achievement-banner');
                b.innerText = "🏆 Unlocked: " + ach.name; b.style.display = "block";
                setTimeout(() => b.style.display = "none", 4000);
            }
        });
    }

    function resetGame() { if(confirm("ERASE ALL PROGRESS?")) { localStorage.clear(); location.reload(); } }

    setInterval(() => { energy += (cps * getBoost() / 10); updateUI(); }, 100);
    setInterval(cloudSave, 30000);
    setInterval(fetchKing, 60000);
    setInterval(() => { if (Math.random() < 0.05) startBuffetRush(); }, 60000);
    
    initShop(); cloudLoad();
</script>
</body>
</html>
