<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker: The Mass Grind</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #b71c1c;
            --dark: #0a0a0a;
            --light: #e0e0e0;
            --gray: #1e1e1e;
            --gold: #fbc02d;
        }

        body {
            font-family: 'Segoe UI', Impact, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .game-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #222 0%, #000 100%);
        }

        .stats-container { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 4.5rem; margin: 0; color: var(--primary); text-shadow: 2px 2px 10px #000; }
        
        #lincoln-image {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 8px solid var(--primary);
            box-shadow: 0 0 30px rgba(183, 28, 28, 0.3);
            transition: transform 0.05s;
        }

        #lincoln-image:active { transform: scale(0.92); }

        .upgrade-section {
            width: 420px;
            background-color: var(--gray);
            overflow-y: auto;
            padding: 20px;
            border-left: 3px solid #333;
        }

        .upgrade-card {
            background: #252525;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border-radius: 6px;
            border-left: 5px solid transparent;
            transition: 0.2s;
        }

        .upgrade-card:hover:not(.disabled) { background: #333; border-left-color: var(--primary); }
        .upgrade-card.disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }
        
        .up-info { display: flex; flex-direction: column; }
        .up-name { font-size: 1.1rem; color: #fff; text-transform: uppercase; font-weight: bold; }
        .up-benefit { font-size: 0.8rem; color: #888; }
        .up-cost { font-weight: bold; color: var(--gold); font-family: monospace; font-size: 1.1rem; }
        
        #save-status { position: absolute; bottom: 10px; left: 10px; color: #444; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="save-status">Connecting to Cloud...</div>

    <div class="game-section">
        <div class="stats-container">
            <h1 id="mass-display">0</h1>
            <div style="color: #888; letter-spacing: 2px;">TOTAL MASS</div>
            <div style="margin-top:15px; font-weight: bold; color: #666;">
                SEC: <span id="cps-display">0</span> | CLICK: <span id="cpc-display">1</span>
            </div>
        </div>
        <img src="IMG_0668.jpg" id="lincoln-image" alt="Lincoln" onclick="doClick()">
    </div>

    <div class="upgrade-section">
        <h3 style="text-align:center; color: var(--primary); margin-top:0; letter-spacing: 3px;">THE UPGRADES</h3>
        <div id="upgrade-list"></div>
    </div>

    <script>
        const SB_URL = 'https://rvnufxaqvjcrvyzdvnxz.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2bnVmeGFxdmpjcnZ5emR2bnh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNTg4MTAsImV4cCI6MjA4ODgzNDgxMH0.WCLcP9mbxBF0dcDVXHG1xA0zGATjhsjv_UGFrtOyL8E';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let mass = 0;
        let cps = 0;
        let cpc = 1;
        let userId = null;
        let isLoaded = false; // Prevent overwriting before load

        const upgradeData = [
            { name: "Fast Eat", cost: 20, power: 0.5, type: "click" },
            { name: "Small Torta", cost: 100, power: 0.2, type: "cps" },
            { name: "Chud Glance", cost: 500, power: 1.5, type: "click" },
            { name: "Obese Gains", cost: 1500, power: 1, type: "cps" },
            { name: "Mega Eat", cost: 5000, power: 4, type: "click" },
            { name: "Torta Stand", cost: 12000, power: 5, type: "cps" },
            { name: "Chud Mentality", cost: 35000, power: 12, type: "click" },
            { name: "Obese Empire", cost: 85000, power: 20, type: "cps" },
            { name: "Infinite Eat", cost: 200000, power: 40, type: "click" },
            { name: "Supreme Torta", cost: 500000, power: 75, type: "cps" },
            { name: "Chud God", cost: 1200000, power: 150, type: "click" },
            { name: "Massive Obese", cost: 4000000, power: 300, type: "cps" },
            { name: "The Last Torta", cost: 15000000, power: 800, type: "click" },
            { name: "Chud Singularity", cost: 50000000, power: 2000, type: "cps" },
            { name: "Ultimate Mass", cost: 200000000, power: 5000, type: "cps" }
        ];

        async function startSession() {
            const { data, error } = await supabaseClient.auth.signInAnonymously();
            if (error) {
                document.getElementById('save-status').innerText = "Cloud Error: Local Play Only";
            } else {
                userId = data.user.id;
                await loadFromSupabase(); // Wait for data before doing anything else
            }
        }

        function initShop() {
            const list = document.getElementById('upgrade-list');
            list.innerHTML = '';
            upgradeData.forEach((up, i) => {
                const benefitText = up.type === "click" ? `+${up.power} per click` : `+${up.power} per sec`;
                const card = document.createElement('div');
                card.className = 'upgrade-card disabled';
                card.id = `up-${i}`;
                card.onclick = () => buyUpgrade(i);
                card.innerHTML = `
                    <div class="up-info">
                        <span class="up-name">${up.name}</span>
                        <span class="up-benefit">${benefitText}</span>
                    </div>
                    <div class="up-cost" id="cost-${i}">${up.cost}</div>
                `;
                list.appendChild(card);
            });
        }

        function doClick() {
            mass += cpc;
            updateUI();
        }

        function buyUpgrade(i) {
            const up = upgradeData[i];
            if (mass >= up.cost) {
                mass -= up.cost;
                if (up.type === "click") cpc += up.power;
                else cps += up.power;
                up.cost = Math.floor(up.cost * 1.95);
                updateUI();
                saveToSupabase();
            }
        }

        function updateUI() {
            document.getElementById('mass-display').innerText = Math.floor(mass).toLocaleString();
            document.getElementById('cps-display').innerText = cps.toFixed(1);
            document.getElementById('cpc-display').innerText = cpc.toFixed(1);
            upgradeData.forEach((up, i) => {
                const btn = document.getElementById(`up-${i}`);
                if (btn) {
                    document.getElementById(`cost-${i}`).innerText = Math.floor(up.cost).toLocaleString();
                    mass >= up.cost ? btn.classList.remove('disabled') : btn.classList.add('disabled');
                }
            });
        }

        async function saveToSupabase() {
            if (!userId || !isLoaded) return; // DON'T SAVE IF DATA ISN'T LOADED YET
            const { error } = await supabaseClient.from('profiles').upsert({
                id: userId,
                mass: Math.floor(mass),
                cps: cps,
                cpc: cpc,
                costs: upgradeData.map(u => u.cost)
            });
            if (!error) document.getElementById('save-status').innerText = "Progress Saved: " + new Date().toLocaleTimeString();
        }

        async function loadFromSupabase() {
            let { data, error } = await supabaseClient.from('profiles').select('*').eq('id', userId).single();
            
            if (data) {
                mass = data.mass || 0;
                cps = data.cps || 0;
                cpc = data.cpc || 1;
                if (data.costs) {
                    data.costs.forEach((c, i) => { if(upgradeData[i]) upgradeData[i].cost = c; });
                }
            }
            
            isLoaded = true; // Now it's safe to save!
            document.getElementById('save-status').innerText = "Cloud Synced";
            updateUI();
        }

        setInterval(() => { 
            if(cps > 0) { 
                mass += (cps / 10); 
                updateUI(); 
            } 
        }, 100);

        setInterval(saveToSupabase, 10000); // Autosave every 10s

        initShop();
        startSession();
    </script>
</body>
</html>
