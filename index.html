<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        #game-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .stats {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #d32f2f; /* Red to match the shirt */
        }

        #lincoln-image {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.1s;
            border: 5px solid #d32f2f;
        }

        #lincoln-image:active {
            transform: scale(0.95);
        }

        .upgrades {
            margin-top: 2rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background-color: #b71c1c;
        }

        .per-second {
            font-size: 1rem;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="stats">Mass: <span id="mass-count">0</span></div>
        <div class="per-second">Mass per second: <span id="mps-count">0</span></div>
        
        <img src="IMG_0668.jpg" id="lincoln-image" alt="Lincoln">

        <div class="upgrades">
            <button id="upgrade1" onclick="buyUpgrade(1)">
                Better Glasses (Cost: 10)<br>+1 per click
            </button>
            <button id="upgrade2" onclick="buyUpgrade(2)">
                Auto-Lincoln (Cost: 50)<br>+1 mass/sec
            </button>
            <button id="upgrade3" onclick="buyUpgrade(3)">
                Mega Mass (Cost: 200)<br>+5 mass/sec
            </button>
        </div>
    </div>

    <script>
        let mass = 0;
        let clickValue = 1;
        let massPerSecond = 0;

        let costs = {
            up1: 10,
            up2: 50,
            up3: 200
        };

        const imageElement = document.getElementById('lincoln-image');
        const massDisplay = document.getElementById('mass-count');
        const mpsDisplay = document.getElementById('mps-count');

        // Logic for clicking Lincoln
        imageElement.onclick = () => {
            mass += clickValue;
            updateDisplay();
        };

        function buyUpgrade(type) {
            if (type === 1 && mass >= costs.up1) {
                mass -= costs.up1;
                clickValue += 1;
                costs.up1 = Math.floor(costs.up1 * 1.5);
                document.getElementById('upgrade1').innerHTML = `Better Glasses (Cost: ${costs.up1})<br>+1 per click`;
            } else if (type === 2 && mass >= costs.up2) {
                mass -= costs.up2;
                massPerSecond += 1;
                costs.up2 = Math.floor(costs.up2 * 1.5);
                document.getElementById('upgrade2').innerHTML = `Auto-Lincoln (Cost: ${costs.up2})<br>+1 mass/sec`;
            } else if (type === 3 && mass >= costs.up3) {
                mass -= costs.up3;
                massPerSecond += 5;
                costs.up3 = Math.floor(costs.up3 * 1.5);
                document.getElementById('upgrade3').innerHTML = `Mega Mass (Cost: ${costs.up3})<br>+5 mass/sec`;
            }
            updateDisplay();
        }

        function updateDisplay() {
            massDisplay.innerText = Math.floor(mass);
            mpsDisplay.innerText = massPerSecond;
            
            // Disable buttons if you can't afford them
            document.getElementById('upgrade1').disabled = mass < costs.up1;
            document.getElementById('upgrade2').disabled = mass < costs.up2;
            document.getElementById('upgrade3').disabled = mass < costs.up3;
        }

        // Game Loop for Auto-Clickers
        setInterval(() => {
            mass += massPerSecond / 10;
            updateDisplay();
        }, 100);

    </script>
</body>
</html>
