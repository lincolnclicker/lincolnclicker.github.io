<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker</title>
    <link rel="icon" type="image/jpeg" href="IMG_0668.jpg">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #1e272e;
            --gold: #f1c40f;
            --chat-bg: #252a34;
            --success: #55efc4;
            --danger: #ff4757;
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: #1e272e;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
            transition: background 1s ease-in-out;
        }

        .bg-kitchen { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200'); }
        .bg-basement { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1200'); }

        #game-wrapper { max-width: 1200px; width: 100%; display: flex; gap: 20px; padding: 20px; box-sizing: border-box; z-index: 1; }
        .left-column { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .clicker-section { text-align: center; display: flex; flex-direction: column; align-items: center; }

        #score-panel {
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 20px;
            border: 3px solid var(--primary); width: 100%;
            box-sizing: border-box; backdrop-filter: blur(15px);
        }

        #score-text { font-size: 3.5rem; color: var(--gold); margin: 0; line-height: 1; }

        #lincoln-main {
            width: 280px; height: 280px; border-radius: 50%; cursor: pointer;
            object-fit: cover; border: 8px solid var(--secondary);
            transition: transform 0.05s, filter 0.3s; user-select: none; margin-top: 10px;
        }
        #lincoln-main:active { transform: scale(0.94); }

        .shop-container {
            flex: 1.2; background: rgba(0, 0, 0, 0.5); padding: 15px;
            border-radius: 20px; height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .upgrade {
            width: 100%; background: #2f3542; border: 2px solid #444;
            border-radius: 12px; padding: 12px 18px; color: white; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; box-sizing: border-box; transition: 0.2s;
        }
        .upgrade:disabled { opacity: 0.3; filter: grayscale(1); }
        .can-afford { border-color: var(--gold) !important; background: #3e4452; }

        .u-info { text-align: left; }
        .u-name { font-weight: bold; color: #fab1a0; display: block; font-size: 1rem; }
        .u-cost { color: var(--success); font-size: 0.9rem; display: block; margin-top: 4px; }
        .u-count { font-size: 1.5rem; font-weight: bold; opacity: 0.6; }

        #chat-icon-container { position: fixed; bottom: 20px; right: 20px; width: 65px; height: 65px; z-index: 1000; cursor: pointer; }
        #chat-icon { width: 100%; height: 100%; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        #chat-notification {
            position: absolute; top: -2px; right: -2px; background: var(--danger);
            color: white; width: 26px; height: 26px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.85rem; border: 3px solid #1e272e;
        }

        #chat-box { position: fixed; bottom: 95px; right: 20px; width: 340px; height: 500px; background: var(--chat-bg); border: 2px solid var(--primary); border-radius: 12px; display: none; flex-direction: column; z-index: 1000; overflow: hidden; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.85rem; background: #1a1e26; }
        .msg { margin-bottom: 8px; padding: 6px; border-radius: 6px; background: rgba(255,255,255,0.05); }

        #admin-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2f3542; border: 3px solid var(--gold); padding: 20px; border-radius: 15px;
            z-index: 10001; width: 320px; box-shadow: 0 0 100px #000;
        }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #1e222b; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .particle { position: fixed; pointer-events: none; animation: flyUp 0.8s forwards; font-weight: bold; color: var(--gold); z-index: 999; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body class="bg-kitchen">

<div id="admin-trigger" onclick="openAdmin()" style="position:fixed; top:0; right:0; width:60px; height:60px; cursor:pointer; opacity:0.01; z-index:9999;"></div>

<div id="admin-panel">
    <h3 style="margin-top:0; color:var(--gold); text-align:center;">ADMIN MASTER CONTROL</h3>
    <input type="text" id="admin-target-user" class="admin-input" placeholder="Target Username">
    <input type="text" id="admin-value" class="admin-input" placeholder="Value (Mass/Mins)">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
        <button onclick="triggerEvent('feast')" style="background:var(--gold); border:none; padding:10px; font-weight:bold; cursor:pointer;">🔥 FEAST</button>
        <button onclick="triggerEvent('storm')" style="background:#00d2ff; border:none; padding:10px; font-weight:bold; cursor:pointer;">⚡ STORM</button>
        <button onclick="adminAction('mass')" style="background:var(--success); border:none; padding:10px; font-weight:bold; cursor:pointer;">GIVE MASS</button>
        <button onclick="clearChatNow()" style="background:var(--danger); color:white; border:none; padding:10px; font-weight:bold; cursor:pointer;">WIPE CHAT</button>
    </div>
    <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; background:none; border:none; color:#aaa; cursor:pointer; margin-top:15px;">Close Admin Panel</button>
</div>

<div id="game-wrapper">
    <div class="left-column">
        <div class="clicker-section">
            <div id="score-panel">
                <h1 id="score-text">0</h1>
                <div style="font-size: 0.85rem; margin-top: 10px; opacity:0.8;">
                    Click: <span id="stat-click">1</span> | Sec: <span id="stat-cps">0</span><br>
                    <span style="color:var(--gold)">Golden Tortas: <span id="stat-prestige">0</span></span>
                </div>
            </div>
            <img src="IMG_0668.jpg" id="lincoln-main" alt="Lincoln">
            <button id="prestige-btn" onclick="prestige()" style="display:none; margin-top:15px; background:var(--gold); color:black; padding:10px 20px; border-radius:10px; border:none; font-weight:bold; cursor:pointer;">WEIGH IN (PRESTIGE)</button>
        </div>
        <div id="leaderboard-panel" style="background:rgba(0,0,0,0.7); padding:15px; border-radius:20px; border:1px solid rgba(255,255,255,0.1);">
            <h3 style="color:var(--gold); text-align:center; margin:0 0 10px 0;">TOP HEAVYWEIGHTS</h3>
            <div id="lb-content">Loading...</div>
        </div>
    </div>
    <div class="shop-container" id="shop"></div>
</div>

<div id="chat-icon-container" onclick="toggleChat()">
    <div id="chat-icon">💬</div>
    <div id="chat-notification">0</div>
</div>

<div id="chat-box">
    <div style="background:var(--primary); padding: 12px; font-weight: bold; display: flex; justify-content: space-between;">
        <span>Lincoln Chat</span>
        <span onclick="toggleChat()" style="cursor:pointer;">×</span>
    </div>
    <div id="chat-messages"></div>
    <div style="display:flex; padding:10px; background:#1e222b;">
        <input type="text" id="chat-msg-input" style="flex:1; background:#333; color:white; border:none; padding:8px; border-radius:5px;" placeholder="Message..." onkeypress="if(event.key==='Enter') sendChat()">
    </div>
</div>

<script>
const DB_URL = 'https://cnstrmbiosdykiqyxcua.supabase.co';
const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc3RybWJpb3NkeWtpcXl4Y3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDEzMDEsImV4cCI6MjA4ODc3NzMwMX0.hf6kiAniU-Hw1J3xuYPK_xlUO9BLR3d5vkEq41uf8co';
const _supabase = supabase.createClient(DB_URL, DB_KEY);

let energy = 0, clickPower = 1, cps = 0, goldenTortas = 0, unreadCount = 0;
let chatName = localStorage.getItem('chat_name') || "Player_" + Math.floor(Math.random()*1000);
let eventMultiplier = 1, currentEvent = null;

const initialUpgrades = [
    { id: 0, name: "Extra Torta", cost: 15, power: 0.1, type: "click" },
    { id: 1, name: "Chud Burger", cost: 100, power: 0.3, type: "cps" },
    { id: 2, name: "Lard-o-Meter", cost: 500, power: 0.8, type: "cps" },
    { id: 3, name: "Bulk Season", cost: 1200, power: 0.6, type: "click" },
    { id: 4, name: "Torta Pounder 3000", cost: 3000, power: 2.5, type: "cps" },
    { id: 5, name: "Infinite Buffet", cost: 10000, power: 7.0, type: "cps" },
    { id: 6, name: "Chudmosis", cost: 25000, power: 15.0, type: "cps" },
    { id: 7, name: "Fried Top Hat", cost: 85000, power: 50.0, type: "cps" },
    { id: 8, name: "Torta Transfusion", cost: 200000, power: 12, type: "click" },
    { id: 9, name: "Gravy Shower", cost: 500000, power: 150, type: "cps" },
    { id: 10, name: "Mega-Chud", cost: 2000000, power: 500, type: "cps" },
    { id: 11, name: "Giga-Torta", cost: 8000000, power: 1500, type: "cps" },
    { id: 12, name: "Sumo Lincoln", cost: 40000000, power: 1200, type: "click" },
    { id: 13, name: "Event Horizon Gut", cost: 150000000, power: 18000, type: "cps" },
    { id: 14, name: "Final Chud-down", cost: 2500000000, power: 120000, type: "cps" }
];
let upgrades = JSON.parse(localStorage.getItem('lincoln_upgrades')) || initialUpgrades.map(u => ({...u, count: 0}));

function formatNum(n) {
    if (n >= 1e9) return (n/1e9).toFixed(2) + "B";
    if (n >= 1e6) return (n/1e6).toFixed(2) + "M";
    return Math.floor(n).toLocaleString();
}

function updateUI() {
    let prestigeBoost = 1 + (goldenTortas * 0.1);
    document.getElementById('score-text').innerText = formatNum(energy);
    document.getElementById('stat-click').innerText = formatNum(clickPower * eventMultiplier * prestigeBoost);
    document.getElementById('stat-cps').innerText = formatNum(cps * (currentEvent === 'feast' ? 2 : 1) * prestigeBoost);
    document.getElementById('stat-prestige').innerText = goldenTortas;
    document.getElementById('prestige-btn').style.display = energy >= 1e9 ? 'block' : 'none';

    upgrades.forEach(u => {
        const btn = document.getElementById(`up-${u.id}`);
        if(btn) {
            btn.disabled = energy < u.cost;
            energy >= u.cost ? btn.classList.add('can-afford') : btn.classList.remove('can-afford');
            document.getElementById(`cost-${u.id}`).innerText = formatNum(u.cost) + " Mass";
            document.getElementById(`count-${u.id}`).innerText = u.count;
        }
    });
}

function initShop() {
    const shop = document.getElementById('shop'); shop.innerHTML = "";
    upgrades.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'upgrade'; btn.id = `up-${u.id}`;
        btn.onclick = () => buyUpgrade(u.id);
        btn.innerHTML = `<div class="u-info"><span class="u-name">${u.name}</span><span class="u-cost" id="cost-${u.id}">${formatNum(u.cost)} Mass</span></div><div class="u-count" id="count-${u.id}">${u.count}</div>`;
        shop.appendChild(btn);
    });
}

function buyUpgrade(id) {
    const u = upgrades.find(x => x.id === id);
    if (energy >= u.cost) {
        energy -= u.cost; u.count++;
        if (u.type === "click") clickPower += u.power; else cps += u.power;
        u.cost *= 1.35; updateUI(); saveGame();
    }
}

document.getElementById('lincoln-main').onclick = (e) => {
    let prestigeBoost = 1 + (goldenTortas * 0.1);
    let val = clickPower * eventMultiplier * prestigeBoost;
    energy += val;
    showParticle(e.clientX, e.clientY, `+${formatNum(val)}`);
    updateUI();
};

setInterval(() => { 
    let prestigeBoost = 1 + (goldenTortas * 0.1);
    let mult = (currentEvent === 'feast' ? 2 : 1);
    energy += (cps * mult * prestigeBoost / 10); 
    updateUI(); 
}, 100);

function toggleChat() {
    const box = document.getElementById('chat-box');
    const badge = document.getElementById('chat-notification');
    if (box.style.display === 'flex') {
        box.style.display = 'none';
    } else {
        box.style.display = 'flex';
        unreadCount = 0;
        badge.style.display = 'none';
        fetchMessages();
    }
}

async function sendChat() {
    const input = document.getElementById('chat-msg-input');
    if (!input.value) return;
    await _supabase.from('global_chat').insert([{ username: chatName, message: input.value }]);
    input.value = "";
}

async function fetchMessages() {
    const { data } = await _supabase.from('global_chat').select('*').order('created_at', { ascending: false }).limit(30);
    if (data) {
        document.getElementById('chat-messages').innerHTML = data.reverse().map(m => `<div class="msg"><b>${m.username}:</b> ${m.message}</div>`).join('');
        const c = document.getElementById('chat-messages'); c.scrollTop = c.scrollHeight;
    }
}

_supabase.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'global_chat' }, () => {
    if (document.getElementById('chat-box').style.display !== 'flex') {
        unreadCount++;
        const badge = document.getElementById('chat-notification');
        badge.innerText = unreadCount; badge.style.display = 'flex';
    } else { fetchMessages(); }
}).subscribe();

async function triggerEvent(type) {
    const exp = new Date(Date.now() + 300000).toISOString();
    await _supabase.from('game_events').insert([{ event_type: type, expires_at: exp }]);
    alert("Event Triggered Server-wide!");
}

async function adminAction(type) {
    const target = document.getElementById('admin-target-user').value;
    const val = document.getElementById('admin-value').value;
    if(type === 'mass') {
        await _supabase.from('leaderboard').update({ clicks: parseFloat(val) }).eq('username', target);
        alert("Mass set for " + target);
    }
}

async function clearChatNow() { 
    if(confirm("Wipe all chat?")) {
        await _supabase.from('global_chat').delete().neq('id', 0); 
        location.reload(); 
    }
}

async function openAdmin() {
    const { data } = await _supabase.from('leaderboard').select('admin').eq('username', chatName).single();
    if (data?.admin) document.getElementById('admin-panel').style.display = 'block';
    else alert("Access Denied.");
}

function saveGame() {
    localStorage.setItem('lincoln_energy', energy);
    localStorage.setItem('lincoln_cp', clickPower);
    localStorage.setItem('lincoln_cps', cps);
    localStorage.setItem('lincoln_gt', goldenTortas);
    localStorage.setItem('lincoln_upgrades', JSON.stringify(upgrades));
    cloudSync();
}

async function cloudSync() {
    await _supabase.from('leaderboard').upsert({ username: chatName, clicks: Math.floor(energy), golden_tortas: goldenTortas });
}

function loadGame() {
    energy = parseFloat(localStorage.getItem('lincoln_energy')) || 0;
    clickPower = parseFloat(localStorage.getItem('lincoln_cp')) || 1;
    cps = parseFloat(localStorage.getItem('lincoln_cps')) || 0;
    goldenTortas = parseInt(localStorage.getItem('lincoln_gt')) || 0;
}

function prestige() {
    if(confirm("Reset all mass for Golden Tortas? (10% boost each)")) {
        goldenTortas += Math.floor(Math.log10(energy) - 8);
        energy = 0; clickPower = 1; cps = 0;
        upgrades = initialUpgrades.map(u => ({...u, count: 0}));
        saveGame(); location.reload();
    }
}

async function fetchLeaderboard() {
    const { data } = await _supabase.from('leaderboard').select('username, clicks').order('clicks', { ascending: false }).limit(10);
    if (data) {
        document.getElementById('lb-content').innerHTML = data.map((u, i) => `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #333;"><span>#${i+1} ${u.username}</span><span>${formatNum(u.clicks)}</span></div>`).join('');
    }
}

function showParticle(x, y, text) {
    const p = document.createElement('div'); p.className = 'particle'; p.innerText = text;
    p.style.left = x + 'px'; p.style.top = y + 'px';
    document.body.appendChild(p); setTimeout(() => p.remove(), 800);
}

loadGame();
initShop();
updateUI();
fetchLeaderboard();
setInterval(fetchLeaderboard, 15000);
</script>
</body>
</html>
