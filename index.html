<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker: Heavyweight Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #1e272e;
            --gold: #f1c40f;
            --chat-bg: #252a34;
            --buffet-color: #ff4757;
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: #1e272e;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow: hidden;
            transition: background 1s ease-in-out;
        }

        .bg-kitchen { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200'); }
        .bg-buffet { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200'); }
        .bg-factory { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=1200'); }
        .bg-space { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200'); }

        #game-wrapper { max-width: 1200px; width: 100%; display: flex; gap: 20px; padding: 20px; box-sizing: border-box; z-index: 1; }
        .clicker-section { flex: 1; text-align: center; display: flex; flex-direction: column; align-items: center; }

        #score-panel {
            background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 20px;
            border: 3px solid var(--primary); margin-bottom: 20px; width: 100%;
            box-sizing: border-box; backdrop-filter: blur(15px);
        }

        #score-text { font-size: 3.5rem; color: var(--gold); margin: 0; line-height: 1; }

        #lincoln-main {
            width: 300px; height: 300px; border-radius: 50%; cursor: pointer;
            object-fit: cover; border: 8px solid var(--secondary);
            transition: transform 0.05s, filter 0.3s; user-select: none;
        }

        #lincoln-main:active { transform: scale(0.94); }

        .shop-container {
            flex: 1.2; background: rgba(0, 0, 0, 0.5); padding: 15px;
            border-radius: 20px; height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .upgrade {
            width: 100%; background: #2f3542; border: 2px solid #444;
            border-radius: 12px; padding: 12px 18px; color: white; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 10px; box-sizing: border-box; transition: 0.2s;
        }

        .upgrade:disabled { opacity: 0.3; filter: grayscale(1); }
        .can-afford { border-color: var(--gold) !important; background: #3e4452; }

        .u-info { text-align: left; }
        .u-name { font-weight: bold; color: #fab1a0; display: block; font-size: 1rem; }
        .u-cost { color: #55efc4; font-size: 0.9rem; }
        .u-count { font-size: 1.5rem; font-weight: bold; opacity: 0.6; }

        .prestige-btn { background: var(--gold); color: black; font-weight: bold; width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; margin-top: 10px; }

        #chat-icon { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 30px; z-index: 1000; }
        #chat-box { position: fixed; bottom: 90px; right: 20px; width: 340px; height: 500px; background: var(--chat-bg); border: 2px solid var(--primary); border-radius: 12px; display: none; flex-direction: column; z-index: 1000; overflow: hidden; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 0.85rem; background: #1a1e26; }
        
        .emote-bar { display: flex; gap: 5px; padding: 8px; background: #2f3542; border-top: 1px solid #444; }
        .emote-btn { background: #3e4452; border: none; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 1.2rem; }

        .msg { margin-bottom: 8px; padding: 6px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .king-msg { border-left: 3px solid var(--gold); background: rgba(241, 196, 15, 0.1); }

        #admin-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2f3542; border: 3px solid var(--gold); padding: 20px; border-radius: 15px;
            z-index: 10001; box-shadow: 0 0 50px #000; width: 300px;
        }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #1e222b; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 5px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        #achievement-banner { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: black; padding: 12px 25px; border-radius: 30px; font-weight: bold; display: none; z-index: 2000; }
        .particle { position: fixed; pointer-events: none; animation: flyUp 0.8s forwards; font-weight: bold; color: var(--gold); z-index: 999; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body class="bg-kitchen">

<div id="admin-trigger" onclick="openAdmin()" style="position:fixed; top:0; right:0; width:40px; height:40px; cursor:pointer; opacity:0.01; z-index:9999;"></div>

<div id="admin-panel">
    <h3 style="margin-top:0; color:var(--gold); text-align:center;">ADMIN CONTROL</h3>
    
    <input type="text" id="admin-target-user" class="admin-input" placeholder="Target Username">
    <input type="text" id="admin-value" class="admin-input" placeholder="Amount (Mass or Minutes)">
    
    <button onclick="adminAction('mass')" style="width:100%; background:var(--gold); padding:10px; border:none; margin-bottom:10px; font-weight:bold; cursor:pointer; border-radius:5px;">Give Mass</button>
    
    <button onclick="adminAction('timeout')" style="width:100%; background:#e67e22; padding:10px; border:none; margin-bottom:10px; color:white; font-weight:bold; cursor:pointer; border-radius:5px;">Set Timeout (Minutes)</button>
    
    <div class="admin-grid">
        <button onclick="adminAction('ban')" style="background:#e74c3c; padding:10px; border:none; color:white; font-weight:bold; cursor:pointer; border-radius:5px;">Ban</button>
        <button onclick="adminAction('unban')" style="background:#2ecc71; padding:10px; border:none; color:white; font-weight:bold; cursor:pointer; border-radius:5px;">Unban</button>
    </div>
    
    <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; background:none; border:none; color:#aaa; cursor:pointer; margin-top:15px; font-size:0.8rem;">Close Panel</button>
</div>

<div id="achievement-banner">Achievement Unlocked!</div>

<div id="game-wrapper">
    <div class="clicker-section">
        <div id="score-panel">
            <h1 id="score-text">0</h1>
            <p id="env-label" style="margin: 5px 0; letter-spacing: 2px; font-size: 0.7rem; color: #aaa;">LOCATION: THE KITCHEN</p>
            <div style="font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-top: 10px;">
                Per Click: <span id="stat-click">1</span> | Sec: <span id="stat-cps">0</span><br>
                Golden Tortas: <span id="stat-prestige" style="color:var(--gold)">0</span>
            </div>
            <div id="sync-status" style="font-size: 0.65rem; color: #777; margin-top: 8px;">Connecting...</div>
        </div>
        <img src="IMG_0668.jpg" id="lincoln-main" alt="Lincoln">
        <button class="prestige-btn" id="prestige-btn" style="display:none;" onclick="prestige()">WEIGH IN</button>
        <button onclick="resetGame()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer; font-size: 0.7rem; text-decoration: underline;">Hard Reset</button>
    </div>
    <div class="shop-container" id="shop"></div>
</div>

<div id="chat-icon" onclick="toggleChat()">💬</div>
<div id="chat-box">
    <div style="background:var(--primary); padding: 12px; font-weight: bold; display: flex; justify-content: space-between;">
        <span>Global Chat</span>
        <span onclick="toggleChat()" style="cursor:pointer;">×</span>
    </div>
    <div style="background: #000; padding: 5px; font-size: 0.7rem; color: var(--gold); text-align: center;" id="king-display">👑 Loading King...</div>
    <div id="chat-messages"></div>
    <div class="emote-bar">
        <button class="emote-btn" onclick="sendEmote('🍔')">🍔</button>
        <button class="emote-btn" onclick="sendEmote('🌮')">🌮</button>
        <button class="emote-btn" onclick="sendEmote('👑')">👑</button>
        <button class="emote-btn" onclick="sendEmote('🔥')">🔥</button>
    </div>
    <div style="display:flex; padding:10px; background:#1e222b;">
        <input type="text" id="chat-msg-input" style="flex:1; background:#333; color:white; border:none; padding:8px; border-radius:5px;" placeholder="Message..." onkeypress="if(event.key==='Enter') sendChat()">
    </div>
</div>

<script>
    const DB_URL = 'https://cnstrmbiosdykiqyxcua.supabase.co';
    const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc3RybWJpb3NkeWtpcXl4Y3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDEzMDEsImV4cCI6MjA4ODc3NzMwMX0.hf6kiAniU-Hw1J3xuYPK_xlUO9BLR3d5vkEq41uf8co';
    const _supabase = supabase.createClient(DB_URL, DB_KEY);

    let energy = 0, clickPower = 1, cps = 0, goldenTortas = 0, totalClicks = 0, unlockedAchievements = [];
    let currentKing = "", chatName = localStorage.getItem('chat_name') || null;

    const upgrades = [
        { id: 0, name: "Extra Torta", cost: 15, power: 0.1, type: "click", count: 0 },
        { id: 1, name: "Chud Burger", cost: 100, power: 0.3, type: "cps", count: 0 },
        { id: 2, name: "The Lard-o-Meter", cost: 500, power: 0.8, type: "cps", count: 0 },
        { id: 3, name: "Bulk Season", cost: 1200, power: 0.6, type: "click", count: 0 },
        { id: 4, name: "Torta Pounder 3000", cost: 3000, power: 2.5, type: "cps", count: 0 },
        { id: 5, name: "Infinite Buffet Pass", cost: 10000, power: 7.0, type: "cps", count: 0 },
        { id: 6, name: "Chudmosis", cost: 25000, power: 15.0, type: "cps", count: 0 },
        { id: 7, name: "Deep Fried Top Hat", cost: 85000, power: 50.0, type: "cps", count: 0 },
        { id: 8, name: "Torta Transfusion", cost: 200000, power: 12, type: "click", count: 0 },
        { id: 9, name: "Gravy Shower", cost: 500000, power: 150, type: "cps", count: 0 },
        { id: 10, name: "Mega-Chud Transformation", cost: 2000000, power: 500, type: "cps", count: 0 },
        { id: 11, name: "The Giga-Torta", cost: 8000000, power: 1500, type: "cps", count: 0 },
        { id: 12, name: "Sumo Lincoln", cost: 40000000, power: 1200, type: "click", count: 0 },
        { id: 13, name: "Event Horizon Gut", cost: 150000000, power: 18000, type: "cps", count: 0 },
        { id: 14, name: "The Final Chud-down", cost: 2500000000, power: 120000, type: "cps", count: 0 }
    ];

    function initShop() {
        const shop = document.getElementById('shop'); shop.innerHTML = '';
        upgrades.forEach(u => {
            const btn = document.createElement('button');
            btn.className = 'upgrade'; btn.id = `up-${u.id}`;
            btn.onclick = () => buyUpgrade(u.id);
            btn.innerHTML = `<div class="u-info"><span class="u-name">${u.name}</span><span class="u-cost" id="cost-${u.id}">${u.cost.toLocaleString()} Mass</span></div><div class="u-count" id="count-${u.id}">${u.count}</div>`;
            shop.appendChild(btn);
        });
    }

    document.getElementById('lincoln-main').addEventListener('click', (e) => {
        let val = clickPower * (1 + (goldenTortas * 0.1));
        if (currentKing && chatName && chatName !== currentKing) val *= 0.99;
        energy += val; totalClicks++;
        showParticle(e.clientX, e.clientY, `+${val.toFixed(1)}`);
        updateUI();
    });

    function buyUpgrade(id) {
        const u = upgrades[id];
        if (energy >= u.cost) {
            energy -= u.cost; u.count++;
            if (u.type === "click") clickPower += u.power; else cps += u.power;
            u.cost = Math.ceil(u.cost * 1.35); updateUI(); cloudSave();
        }
    }

    function updateUI() {
        document.getElementById('score-text').innerText = Math.floor(energy).toLocaleString();
        document.getElementById('stat-click').innerText = (clickPower * (1 + (goldenTortas * 0.1))).toFixed(1);
        document.getElementById('stat-cps').innerText = (cps * (1 + (goldenTortas * 0.1))).toFixed(1);
        document.getElementById('stat-prestige').innerText = goldenTortas;
        document.getElementById('prestige-btn').style.display = energy >= 1000000000 ? 'block' : 'none';
        
        upgrades.forEach(u => {
            const btn = document.getElementById(`up-${u.id}`);
            if (btn) {
                btn.disabled = energy < u.cost;
                energy >= u.cost ? btn.classList.add('can-afford') : btn.classList.remove('can-afford');
                document.getElementById(`cost-${u.id}`).innerText = u.cost.toLocaleString() + " Mass";
                document.getElementById(`count-${u.id}`).innerText = u.count;
            }
        });

        const body = document.body; const label = document.getElementById('env-label');
        if (energy < 100000) { body.className = 'bg-kitchen'; label.innerText = "LOCATION: THE KITCHEN"; }
        else if (energy < 10000000) { body.className = 'bg-buffet'; label.innerText = "LOCATION: INFINITE BUFFET"; }
        else if (energy < 1000000000) { body.className = 'bg-factory'; label.innerText = "LOCATION: TORTA FACTORY"; }
        else { body.className = 'bg-space'; label.innerText = "LOCATION: OUTER SPACE"; }
    }

    async function cloudSave() {
        const saveObj = { energy, clickPower, cps, goldenTortas, upgrades: upgrades.map(u => ({count: u.count, cost: u.cost})), unlockedAchievements, totalClicks };
        localStorage.setItem('lincoln_local_save', JSON.stringify(saveObj));
        if (chatName) {
            await _supabase.from('leaderboard').upsert({ username: chatName, clicks: Math.floor(energy), golden_tortas: goldenTortas }, { onConflict: 'username' });
            document.getElementById('sync-status').innerText = "Vaulted";
        }
    }

    async function cloudLoad() {
        const local = localStorage.getItem('lincoln_local_save');
        if (local) {
            const d = JSON.parse(local);
            energy = d.energy || 0; clickPower = d.clickPower || 1; cps = d.cps || 0; goldenTortas = d.goldenTortas || 0;
            d.upgrades?.forEach((u, i) => { if(upgrades[i]) { upgrades[i].count = u.count; upgrades[i].cost = u.cost; } });
        }
        updateUI(); fetchKing();
    }

    async function openAdmin() {
        if (!chatName) return;
        const { data } = await _supabase.from('leaderboard').select('is_admin').eq('username', chatName).maybeSingle();
        if (data?.is_admin) document.getElementById('admin-panel').style.display = 'block';
    }

    async function adminAction(type) {
        const target = document.getElementById('admin-target-user').value;
        const valText = document.getElementById('admin-value').value;
        if (!target) return alert("Enter target username!");

        if (type === 'mass') {
            const amount = parseFloat(valText);
            if (isNaN(amount)) return alert("Enter valid number for mass!");
            if (target === chatName) { energy += amount; updateUI(); cloudSave(); }
            else { 
                const { data } = await _supabase.from('leaderboard').select('clicks').eq('username', target).maybeSingle();
                const newMass = (data?.clicks || 0) + amount;
                await _supabase.from('leaderboard').update({ clicks: newMass }).eq('username', target);
            }
            alert(`Added ${amount.toLocaleString()} Mass to ${target}`);
        } else if (type === 'timeout') {
            const mins = parseInt(valText);
            if (isNaN(mins)) return alert("Enter valid minutes!");
            const date = new Date(); date.setMinutes(date.getMinutes() + mins);
            await _supabase.from('leaderboard').update({ timeout_until: date.toISOString() }).eq('username', target);
            alert(`Timed out ${target} for ${mins} mins`);
        } else if (type === 'ban') {
            await _supabase.from('leaderboard').update({ is_banned: true }).eq('username', target);
            alert("Banned " + target);
        } else if (type === 'unban') {
            await _supabase.from('leaderboard').update({ is_banned: false }).eq('username', target);
            alert("Unbanned " + target);
        }
    }

    async function sendChat(emoteMsg = null) {
        if (!chatName) return;
        const input = document.getElementById('chat-msg-input');
        const message = emoteMsg || input.value;
        if (!message) return;

        const { data } = await _supabase.from('leaderboard').select('is_banned, timeout_until').eq('username', chatName).maybeSingle();
        if (data?.is_banned) return alert("You are permanently banned.");
        if (data?.timeout_until && new Date(data.timeout_until) > new Date()) {
            const remain = Math.ceil((new Date(data.timeout_until) - new Date()) / 60000);
            return alert(`You are timed out for ${remain} more minutes.`);
        }

        await _supabase.from('global_chat').insert([{ username: chatName, message: message }]);
        input.value = ""; fetchMessages();
    }

    function sendEmote(e) { sendChat(e); }

    async function fetchMessages() {
        const { data } = await _supabase.from('global_chat').select('*').order('created_at', { ascending: false }).limit(20);
        if (data) {
            document.getElementById('chat-messages').innerHTML = data.reverse().map(m => `
                <div class="msg ${m.username === currentKing ? 'king-msg' : ''}">
                    <b style="color:${m.username === currentKing ? 'var(--gold)' : 'var(--secondary)'}">${m.username}:</b> ${m.message}
                </div>`).join('');
            const c = document.getElementById('chat-messages'); c.scrollTop = c.scrollHeight;
        }
    }

    function toggleChat() {
        const b = document.getElementById('chat-box');
        if (b.style.display === 'flex') { b.style.display = 'none'; return; }
        while (!chatName || chatName.trim() === "") {
            let input = prompt("Username:");
            if (input === null) return;
            chatName = input.trim();
        }
        localStorage.setItem('chat_name', chatName);
        b.style.display = 'flex'; fetchMessages();
    }

    async function fetchKing() {
        const { data } = await _supabase.from('king_of_the_hill').select('*').maybeSingle();
        if (data) { currentKing = data.username; document.getElementById('king-display').innerText = `👑 King: ${data.username}`; }
    }

    function showParticle(x, y, text) {
        const p = document.createElement('div'); p.className = 'particle'; p.innerText = text;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p); setTimeout(() => p.remove(), 800);
    }

    function resetGame() { if (confirm("Reset?")) { energy = 0; clickPower = 1; cps = 0; goldenTortas = 0; initShop(); updateUI(); cloudSave(); } }

    setInterval(() => { energy += (cps * (1 + (goldenTortas * 0.1)) / 10); updateUI(); }, 100);
    setInterval(cloudSave, 20000);
    setInterval(fetchKing, 15000);
    setInterval(() => { if(document.getElementById('chat-box').style.display === 'flex') fetchMessages(); }, 5000);

    initShop(); cloudLoad();
</script>
</body>
</html>
