<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        h1 { color: #ff3e3e; text-transform: uppercase; letter-spacing: 2px; }
        
        #game-container {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        #lincoln-img {
            width: 250px;
            height: auto;
            cursor: pointer;
            border-radius: 10px;
            transition: transform 0.05s;
            user-select: none;
            -webkit-user-drag: none;
            border: 4px solid #333;
        }

        #lincoln-img:active { transform: scale(0.92); border-color: #ff3e3e; }

        .score-display { font-size: 2rem; font-weight: bold; margin: 20px 0; color: #00ffcc; }

        .upgrades-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .upgrade-card {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            cursor: pointer;
            transition: 0.2s;
        }

        .upgrade-card:hover:not(.disabled) { background: #333; border-color: #00ffcc; }
        .upgrade-card.disabled { opacity: 0.4; cursor: not-allowed; }
        
        .cost { display: block; color: #ffbd2e; font-size: 0.9rem; margin-top: 5px; }

        #save-btn {
            margin-top: 30px;
            padding: 10px 20px;
            background: #00ffcc;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Lincoln Clicker</h1>
        <p style="font-size: 0.8rem; opacity: 0.6;">(The non-presidential edition)</p>

        <div class="score-display" id="score">0</div>
        
        <img src="IMG_0668.jpg" id="lincoln-img" alt="Lincoln">

        <div class="upgrades-grid">
            <div id="upg-1" class="upgrade-card disabled" onclick="buyUpgrade('click')">
                <strong>Heavy Fingers</strong>
                <span class="cost" id="cost-click">Cost: 25</span>
                <small>+1 per click</small>
            </div>
            <div id="upg-2" class="upgrade-card disabled" onclick="buyUpgrade('auto')">
                <strong>Lincoln Bot</strong>
                <span class="cost" id="cost-auto">Cost: 100</span>
                <small>+2 per second</small>
            </div>
        </div>

        <button id="save-btn" onclick="saveToSupabase()">Submit to Leaderboard</button>
    </div>

    <script>
        // Supabase Initialization
        const { createClient } = supabase;
        const _supabase = createClient(
            'https://cnstrmbiosdykiqyxcua.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc3RybWJpb3NkeWtpcXl4Y3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDEzMDEsImV4cCI6MjA4ODc3NzMwMX0.hf6kiAniU-Hw1J3xuYPK_xlUO9BLR3d5vkEq41uf8co'
        );

        let clicks = 0;
        let clickPower = 1;
        let autoIncome = 0;
        
        let costs = {
            click: 25,
            auto: 100
        };

        const scoreEl = document.getElementById('score');
        const imgEl = document.getElementById('lincoln-img');

        // Click Logic
        imgEl.addEventListener('click', () => {
            clicks += clickPower;
            updateUI();
        });

        // Upgrade Logic
        function buyUpgrade(type) {
            if (clicks >= costs[type]) {
                clicks -= costs[type];
                
                if (type === 'click') {
                    clickPower += 1;
                    costs.click = Math.ceil(costs.click * 1.85); // Hard scaling
                } else if (type === 'auto') {
                    autoIncome += 2;
                    costs.auto = Math.ceil(costs.auto * 1.95); // Very hard scaling
                }
                
                updateUI();
            }
        }

        // Passive Income Loop
        setInterval(() => {
            if (autoIncome > 0) {
                clicks += autoIncome;
                updateUI();
            }
        }, 1000);

        function updateUI() {
            scoreEl.innerText = Math.floor(clicks);
            
            // Update Buttons Appearance
            const upg1 = document.getElementById('upg-1');
            const upg2 = document.getElementById('upg-2');
            
            upg1.className = clicks >= costs.click ? 'upgrade-card' : 'upgrade-card disabled';
            upg2.className = clicks >= costs.auto ? 'upgrade-card' : 'upgrade-card disabled';
            
            document.getElementById('cost-click').innerText = `Cost: ${costs.click}`;
            document.getElementById('cost-auto').innerText = `Cost: ${costs.auto}`;
        }

        // Database Function
        async function saveToSupabase() {
            const username = prompt("Enter your name for the leaderboard:");
            if (!username) return;

            const { data, error } = await _supabase
                .from('leaderboard')
                .insert([{ username: username, clicks: Math.floor(clicks) }]);

            if (error) {
                console.error(error);
                alert("Error saving: " + error.message);
            } else {
                alert("Score Recorded!");
            }
        }
    </script>
</body>
</html>
