<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker: Heavyweight Master Build</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6c5ce7; --secondary: #a29bfe; --bg: #1e272e;
            --gold: #f1c40f; --chat-bg: #252a34; --card-bg: rgba(0, 0, 0, 0.8);
            --danger: #ff4757; --success: #55efc4;
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: #1e272e; color: white; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background 1s ease-in-out;
        }

        /* Background States */
        .bg-kitchen { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200'); }
        .bg-buffet { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200'); }
        .bg-factory { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=1200'); }
        .bg-space { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200'); }

        #game-layout { display: flex; flex: 1; height: calc(100vh - 70px); overflow: hidden; padding: 20px; gap: 20px; box-sizing: border-box; }
        
        .left-panel { flex: 1.4; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .right-panel { flex: 1; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; padding: 15px; overflow: hidden; }

        .view-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 10; padding: 40px; box-sizing: border-box; border-radius: 20px; }
        .view-overlay.active { display: block; overflow-y: auto; }

        /* Admin Panel */
        #admin-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2f3542; border: 3px solid var(--gold); padding: 20px; border-radius: 15px;
            z-index: 10001; width: 320px; box-shadow: 0 0 100px #000;
        }
        .admin-input { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; background: #1e272e; border: 1px solid #444; color: white; border-radius: 5px; }
        .admin-btn { width: 100%; margin: 5px 0; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Main Game UI */
        #score-panel { text-align: center; background: var(--card-bg); padding: 20px; border-radius: 20px; border: 2px solid var(--primary); margin-bottom: 20px; width: 100%; backdrop-filter: blur(15px); }
        #score-text { font-size: 3.5rem; margin: 0; color: var(--gold); }
        
        #lincoln-main {
            width: 280px; height: 280px; border-radius: 50%; cursor: pointer;
            object-fit: cover; border: 8px solid var(--secondary);
            transition: transform 0.05s; user-select: none;
        }
        #lincoln-main:active { transform: scale(0.94); }

        /* Shop & Upgrades */
        .scroll-area { flex: 1; overflow-y: auto; }
        .upgrade {
            width: 100%; background: #2f3542; border: 2px solid #444; border-radius: 12px;
            padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; color: white; transition: 0.2s;
        }
        .upgrade.can-afford { border-color: var(--gold); background: #3e4452; }
        .upgrade:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .u-name { font-weight: bold; color: #fab1a0; display: block; }

        .trophy-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #444; }
        .trophy-card.unlocked { border-left-color: var(--gold); background: rgba(241, 196, 15, 0.1); }

        /* Prestige Button */
        .prestige-btn { background: var(--gold); color: black; font-weight: bold; width: 100%; padding: 15px; border-radius: 12px; border: none; cursor: pointer; margin-top: 10px; }

        /* Chat UI */
        #chat-btn { position: fixed; bottom: 85px; right: 20px; width: 60px; height: 60px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 25px; z-index: 1000; }
        #chat-box { position: fixed; bottom: 155px; right: 20px; width: 320px; height: 450px; background: var(--chat-bg); border: 2px solid var(--primary); border-radius: 15px; display: none; flex-direction: column; z-index: 1000; overflow: hidden; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; background: #1a1e26; }
        .msg { margin-bottom: 8px; padding: 6px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .king-msg { border-left: 3px solid var(--gold); background: rgba(241, 196, 15, 0.1); }
        .system-msg { border-left: 3px solid #ff4757; background: rgba(255, 71, 87, 0.1); font-style: italic; color: #ff4757; }

        #nav-bar { height: 70px; background: #2d3436; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--primary); z-index: 100; }
        .nav-item { cursor: pointer; opacity: 0.6; font-weight: bold; }
        .nav-item.active { opacity: 1; color: var(--secondary); }
        .particle { position: fixed; pointer-events: none; animation: flyUp 0.8s forwards; font-weight: bold; color: var(--gold); z-index: 999; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body class="bg-kitchen">

<div id="admin-trigger" onclick="openAdmin()" style="position:fixed; top:0; right:0; width:40px; height:40px; cursor:pointer; opacity:0.01; z-index:9999;"></div>

<div id="admin-panel">
    <h3 style="margin-top:0; color:var(--gold); text-align:center;">BOT COMMANDER</h3>
    <input type="text" id="admin-target" class="admin-input" placeholder="Target Username">
    <input type="number" id="admin-amount" class="admin-input" placeholder="Value (Mass/Mins)">
    
    <button class="admin-btn" style="background:var(--success); color:#111;" onclick="queueBotCommand('mass')">Inject Mass</button>
    <button class="admin-btn" style="background:#ffa502;" onclick="queueBotCommand('timeout')">Timeout (Mins)</button>
    <button class="admin-btn" style="background:var(--danger); color:white;" onclick="queueBotCommand('ban')">Ban User</button>
    <button class="admin-btn" style="background:#2ed573; color:white;" onclick="queueBotCommand('unban')">Unban User</button>
    <button class="admin-btn" style="background:#ff4757; color:white; margin-top:5px;" onclick="clearChatNow()">PURGE CHAT</button>
    
    <button class="admin-btn" style="background:none; color:#aaa; font-size:0.8rem;" onclick="document.getElementById('admin-panel').style.display='none'">Close</button>
</div>

<div id="game-layout">
    <div class="left-panel">
        <div id="score-panel">
            <h1 id="score-text">0</h1>
            <p id="env-label" style="margin: 5px 0; letter-spacing: 2px; font-size: 0.7rem; color: #aaa;">LOCATION: THE KITCHEN</p>
            <div style="font-size: 0.8rem; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-top: 10px;">
                CLICK: +<span id="stat-click">1</span> | SEC: <span id="stat-cps">0</span><br>
                Golden Tortas: <span id="stat-prestige" style="color:var(--gold)">0</span>
            </div>
            <div id="boost-text" style="font-size: 0.65rem; color: var(--gold); margin-top:5px;">Trophy Boost: +0%</div>
        </div>
        
        <img src="IMG_0668.jpg" id="lincoln-main">
        <button class="prestige-btn" id="prestige-btn" style="display:none;" onclick="prestige()">WEIGH IN (PRESTIGE)</button>

        <div id="view-trophies" class="view-overlay">
            <h2 style="color:var(--gold)">🏆 Trophy Room</h2>
            <div id="achievement-list"></div>
            <button onclick="closeOverlays(); setActiveNav(document.getElementById('nav-game'))" style="padding:15px; width:100%; cursor:pointer; margin-top:20px;">Back</button>
        </div>
    </div>

    <div class="right-panel">
        <h3 style="margin-top:0; color:var(--primary); text-align:center;">SHOP</h3>
        <div class="scroll-area" id="shop-list"></div>
    </div>
</div>

<div id="chat-btn" onclick="toggleChat()">💬</div>
<div id="chat-box">
    <div style="background:var(--primary); padding:12px; font-weight:bold; display:flex; justify-content:space-between;">
        <span>Global Chat</span>
        <span id="king-display" style="font-size:0.7rem; color:var(--gold)">👑 King: Lincoln</span>
    </div>
    <div id="chat-msgs"></div>
    <div style="padding:10px; background:#111; display:flex; gap:5px;">
        <input type="text" id="chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendChat()" style="flex:1; background:#333; color:white; border:none; padding:8px; border-radius:5px;">
        <button onclick="sendChat()" style="background:var(--primary); border:none; color:white; padding:0 15px; border-radius:5px;">Send</button>
    </div>
</div>

<div id="nav-bar">
    <div id="nav-game" class="nav-item active" onclick="closeOverlays(); setActiveNav(this)">🥩 Game</div>
    <div class="nav-item" onclick="openOverlay('trophies'); setActiveNav(this)">🏆 Trophies</div>
    <div class="nav-item" onclick="changeName()">⚙️ Name</div>
    <div class="nav-item" onclick="resetGame()">🗑️ Reset</div>
</div>

<script>
    const DB_URL = 'https://cnstrmbiosdykiqyxcua.supabase.co';
    const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc3RybWJpb3NkeWtpcXl4Y3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDEzMDEsImV4cCI6MjA4ODc3NzMwMX0.hf6kiAniU-Hw1J3xuYPK_xlUO9BLR3d5vkEq41uf8co';
    const _supabase = supabase.createClient(DB_URL, DB_KEY);

    let energy = 0, clickPower = 1, cps = 0, goldenTortas = 0, totalClicks = 0;
    let currentKing = "", chatName = localStorage.getItem('chat_name') || null;
    let isAdmin = false;

    const upgrades = [
        { id: 0, name: "Extra Torta", cost: 15, power: 0.1, type: "click", count: 0 },
        { id: 1, name: "Chud Burger", cost: 100, power: 0.3, type: "cps", count: 0 },
        { id: 2, name: "The Lard-o-Meter", cost: 500, power: 0.8, type: "cps", count: 0 },
        { id: 3, name: "Bulk Season", cost: 1200, power: 0.6, type: "click", count: 0 },
        { id: 4, name: "Torta Pounder 3000", cost: 3000, power: 2.5, type: "cps", count: 0 },
        { id: 5, name: "Infinite Buffet Pass", cost: 10000, power: 7.0, type: "cps", count: 0 },
        { id: 6, name: "Chudmosis", cost: 25000, power: 15.0, type: "cps", count: 0 },
        { id: 7, name: "Deep Fried Top Hat", cost: 85000, power: 50.0, type: "cps", count: 0 },
        { id: 8, name: "Torta Transfusion", cost: 200000, power: 12, type: "click", count: 0 },
        { id: 9, name: "Gravy Shower", cost: 500000, power: 150, type: "cps", count: 0 },
        { id: 10, name: "Mega-Chud Transformation", cost: 2000000, power: 500, type: "cps", count: 0 },
        { id: 11, name: "The Giga-Torta", cost: 8000000, power: 1500, type: "cps", count: 0 },
        { id: 12, name: "Sumo Lincoln", cost: 40000000, power: 1200, type: "click", count: 0 },
        { id: 13, name: "Event Horizon Gut", cost: 150000000, power: 18000, type: "cps", count: 0 },
        { id: 14, name: "The Final Chud-down", cost: 2500000000, power: 120000, type: "cps", count: 0 }
    ];

    const achievements = [
        { id: 1, name: "Kitchen Hand", req: 10, type: 'click' },
        { id: 2, name: "Torta Taster", req: 50, type: 'click' },
        { id: 3, name: "Quick Fingers", req: 250, type: 'click' },
        { id: 4, name: "Button Smasher", req: 1000, type: 'click' },
        { id: 5, name: "Click Legend", req: 5000, type: 'click' },
        { id: 6, name: "Gaining Weight", req: 1000, type: 'mass' },
        { id: 7, name: "Heavyweight", req: 10000, type: 'mass' },
        { id: 8, name: "Massive Growth", req: 100000, type: 'mass' },
        { id: 9, name: "One Millionaire", req: 1000000, type: 'mass' },
        { id: 10, name: "Torta Titan", req: 10000000, type: 'mass' },
        { id: 11, name: "Billionaire", req: 1000000000, type: 'mass' },
        { id: 12, name: "Infinite Appetite", req: 10000000000, type: 'mass' },
        { id: 13, name: "Buffet Breaker", req: 5, type: 'upg' },
        { id: 14, name: "Full Belly", req: 10, type: 'upg' },
        { id: 15, name: "Mega-Chud", req: 11, type: 'upg' },
        { id: 16, name: "Sumo Status", req: 13, type: 'upg' },
        { id: 17, name: "The Final Form", req: 15, type: 'upg' },
        { id: 18, name: "Loyal Eater", req: 5000, type: 'click' },
        { id: 19, name: "Catering King", req: 50000, type: 'mass' },
        { id: 20, name: "Lincoln's Best Friend", req: 100000000, type: 'mass' }
    ];
    let unlockedAchievs = JSON.parse(localStorage.getItem('lincoln_achievs')) || [];

    // BOT COMMANDER SYSTEM
    async function queueBotCommand(type) {
        const target = document.getElementById('admin-target').value.trim();
        const amount = parseFloat(document.getElementById('admin-amount').value) || 0;
        if (!target) return alert("Target Required.");

        const { error } = await _supabase.from('admin_updates').insert([{
            target_username: target,
            action_type: type,
            amount: amount,
            created_at: new Date().toISOString()
        }]);

        if (error) alert("Bot Error: " + error.message);
        else alert(`COMMAND LOGGED: ${type} for ${target}`);
    }

    async function clearChatNow() {
        if (!isAdmin) return;
        await _supabase.from('global_chat').delete().gt('id', 0);
        await _supabase.from('global_chat').insert([{ username: "SYSTEM", message: "--- Chat Purged by Admin ---" }]);
        alert("Chat Purged."); fetchMessages();
    }

    // CORE GAMEPLAY
    document.getElementById('lincoln-main').onclick = (e) => {
        let mult = (1 + (unlockedAchievs.length * 0.02)) * (1 + (goldenTortas * 0.1));
        let val = clickPower * mult;
        if (currentKing && chatName && chatName !== currentKing) val *= 0.99;
        energy += val; totalClicks++;
        showParticle(e.clientX, e.clientY, `+${val.toFixed(1)}`);
        checkTrophies(); updateUI();
    };

    function buyUpgrade(id) {
        const u = upgrades.find(up => up.id === id);
        if (energy >= u.cost) {
            energy -= u.cost; u.count++;
            if (u.type === "click") clickPower += u.power; else cps += u.power;
            u.cost = Math.ceil(u.cost * 1.35);
            checkTrophies(); updateUI(); cloudSave();
        }
    }

    function prestige() {
        if (energy >= 1000000000) {
            goldenTortas++;
            energy = 0; clickPower = 1; cps = 0;
            upgrades.forEach(u => { u.count = 0; u.cost = Math.ceil(u.cost / Math.pow(1.35, u.count)); }); // reset costs
            cloudSave(); location.reload();
        }
    }

    function updateUI() {
        let mult = (1 + (unlockedAchievs.length * 0.02)) * (1 + (goldenTortas * 0.1));
        document.getElementById('score-text').innerText = Math.floor(energy).toLocaleString();
        document.getElementById('stat-click').innerText = (clickPower * mult).toFixed(1);
        document.getElementById('stat-cps').innerText = (cps * mult).toFixed(1);
        document.getElementById('stat-prestige').innerText = goldenTortas;
        document.getElementById('boost-text').innerText = `Trophy Boost: +${(unlockedAchievs.length * 2)}%`;
        document.getElementById('prestige-btn').style.display = energy >= 1000000000 ? 'block' : 'none';

        // Background / Location Logic
        const body = document.body; const label = document.getElementById('env-label');
        if (energy < 100000) { body.className = 'bg-kitchen'; label.innerText = "LOCATION: THE KITCHEN"; }
        else if (energy < 10000000) { body.className = 'bg-buffet'; label.innerText = "LOCATION: INFINITE BUFFET"; }
        else if (energy < 1000000000) { body.className = 'bg-factory'; label.innerText = "LOCATION: TORTA FACTORY"; }
        else { body.className = 'bg-space'; label.innerText = "LOCATION: OUTER SPACE"; }

        document.getElementById('shop-list').innerHTML = upgrades.map(u => `
            <button class="upgrade ${energy >= u.cost ? 'can-afford' : ''}" onclick="buyUpgrade(${u.id})" ${energy < u.cost ? 'disabled' : ''}>
                <div style="text-align:left">
                    <span class="u-name">${u.name}</span>
                    <small style="color:var(--success)">+${u.power} ${u.type === 'click' ? 'Click' : 'CPS'}</small><br>
                    <small>${u.cost.toLocaleString()} Mass</small>
                </div>
                <div class="u-count">${u.count}</div>
            </button>`).join('');

        document.getElementById('achievement-list').innerHTML = achievements.map(a => `
            <div class="trophy-card ${unlockedAchievs.includes(a.id) ? 'unlocked' : ''}">
                <strong>${unlockedAchievs.includes(a.id) ? '🏆' : '🔒'} ${a.name}</strong><br>
                <small>${unlockedAchievs.includes(a.id) ? 'Bonus Applied' : 'Keep clicking...'}</small>
            </div>`).join('');
    }

    function checkTrophies() {
        achievements.forEach(a => {
            if (!unlockedAchievs.includes(a.id)) {
                let achieved = false;
                if (a.type === 'click' && totalClicks >= a.req) achieved = true;
                if (a.type === 'mass' && energy >= a.req) achieved = true;
                if (a.type === 'upg' && upgrades[a.req-1]?.count > 0) achieved = true;
                if (achieved) { unlockedAchievs.push(a.id); localStorage.setItem('lincoln_achievs', JSON.stringify(unlockedAchievs)); }
            }
        });
    }

    // CLOUD / ADMIN
    async function cloudSave() {
        if (!chatName) return;
        const save = { energy, clickPower, cps, goldenTortas, totalClicks, upgrades: upgrades.map(u => ({id:u.id, count:u.count, cost:u.cost})) };
        localStorage.setItem('lincoln_local_save', JSON.stringify(save));
        await _supabase.from('leaderboard').upsert({ username: chatName, clicks: Math.floor(energy), golden_tortas: goldenTortas }, { onConflict: 'username' });
    }

    async function checkAdmin() {
        if (!chatName) return;
        const { data } = await _supabase.from('leaderboard').select('is_admin').eq('username', chatName).maybeSingle();
        if (data?.is_admin) isAdmin = true;
    }

    function openAdmin() { if(isAdmin) document.getElementById('admin-panel').style.display='block'; }

    // CHAT
    async function sendChat() {
        if (!chatName) { chatName = prompt("Username?"); localStorage.setItem('chat_name', chatName); checkAdmin(); }
        const input = document.getElementById('chat-input');
        if (!input.value) return;
        const { data: user } = await _supabase.from('leaderboard').select('is_banned, timeout_until').eq('username', chatName).maybeSingle();
        if (user?.is_banned || (user?.timeout_until && new Date(user.timeout_until) > new Date())) return alert("Moderation Active.");
        await _supabase.from('global_chat').insert([{ username: chatName, message: input.value }]);
        input.value = ""; fetchMessages();
    }

    async function fetchMessages() {
        const { data } = await _supabase.from('global_chat').select('*').order('created_at', { ascending: false }).limit(25);
        if (data) {
            document.getElementById('chat-msgs').innerHTML = data.reverse().map(m => `
                <div class="msg ${m.username === 'SYSTEM' ? 'system-msg' : (m.username === currentKing ? 'king-msg' : '')}">
                    <b>${m.username}:</b> ${m.message}
                </div>`).join('');
            const c = document.getElementById('chat-msgs'); c.scrollTop = c.scrollHeight;
        }
    }

    async function fetchKing() {
        const { data } = await _supabase.from('king_of_the_hill').select('*').maybeSingle();
        if (data) { currentKing = data.username; document.getElementById('king-display').innerText = `👑 King: ${data.username}`; }
    }

    function toggleChat() {
        const b = document.getElementById('chat-box');
        b.style.display = (b.style.display === 'flex') ? 'none' : 'flex';
        if (b.style.display === 'flex') fetchMessages();
    }

    function showParticle(x, y, text) {
        const p = document.createElement('div'); p.className = 'particle'; p.innerText = text;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p); setTimeout(() => p.remove(), 800);
    }

    function loadGame() {
        const d = JSON.parse(localStorage.getItem('lincoln_local_save'));
        if (d) {
            energy = d.energy || 0; clickPower = d.clickPower || 1; cps = d.cps || 0; 
            goldenTortas = d.goldenTortas || 0; totalClicks = d.totalClicks || 0;
            d.upgrades?.forEach(s => { let u = upgrades.find(up => up.id === s.id); if(u) { u.count = s.count; u.cost = s.cost; } });
        }
        updateUI(); checkAdmin(); fetchKing();
    }

    function changeName() {
        const n = prompt("New Name?");
        if(n) { localStorage.setItem('chat_name', n.trim()); location.reload(); }
    }

    function resetGame() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }

    setInterval(() => { let mult = (1 + (unlockedAchievs.length * 0.02)) * (1 + (goldenTortas * 0.1)); energy += (cps * mult / 10); updateUI(); }, 100);
    setInterval(cloudSave, 20000);
    setInterval(fetchKing, 15000);
    setInterval(() => { if(document.getElementById('chat-box').style.display === 'flex') fetchMessages(); }, 5000);
    
    loadGame();
    function openOverlay(id) { closeOverlays(); document.getElementById('view-' + id).classList.add('active'); }
    function closeOverlays() { document.querySelectorAll('.view-overlay').forEach(v => v.classList.remove('active')); }
    function setActiveNav(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
</script>
</body>
</html>
