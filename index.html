<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker: Heavyweight Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #1e272e;
            --gold: #f1c40f;
            --chat-bg: #252a34;
        }

        @keyframes bgScroll {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(-45deg, #1e272e, #2d3436, #000000);
            background-size: 400% 400%;
            animation: bgScroll 15s ease infinite;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-wrapper {
            max-width: 950px;
            width: 100%;
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .clicker-section {
            flex: 1;
            text-align: center;
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        #score-panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 20px;
            border: 3px solid var(--primary);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        #score-text {
            font-size: 3.2rem;
            color: var(--gold);
            margin: 0;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.4);
        }

        #lincoln-main {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            border: 8px solid var(--secondary);
            transition: transform 0.05s;
            user-select: none;
            -webkit-user-drag: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #lincoln-main:active { transform: scale(0.94); }

        .shop-container {
            flex: 1.2;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .upgrade {
            width: 100%;
            background: #2f3542;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            transition: 0.2s;
            text-align: left;
        }

        .upgrade:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }
        .can-afford { border-color: var(--gold) !important; background: #3e4452; }

        .u-name { font-weight: bold; color: #fab1a0; display: block; font-size: 1.1rem; }
        .u-cost { color: #55efc4; font-weight: bold; }

        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            animation: flyUp 0.8s forwards;
            font-weight: bold;
            color: var(--gold);
            z-index: 999;
        }

        @keyframes flyUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        /* Chat Styles */
        #chat-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            font-size: 30px;
        }

        #chat-box {
            position: fixed;
            bottom: 90px;
            right: 20px;
            width: 300px;
            height: 400px;
            background: var(--chat-bg);
            border: 2px solid var(--primary);
            border-radius: 10px;
            display: none;
            flex-direction: column;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        #chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #1a1e26;
        }

        .msg { background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 5px; border-left: 3px solid var(--secondary); }
        .msg b { color: var(--secondary); margin-right: 5px; }

        #chat-input-area {
            display: flex;
            padding: 10px;
            background: #1e222b;
            gap: 5px;
        }

        #chat-input-area input {
            flex: 1;
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 5px;
            outline: none;
        }

        #sync-status { font-size: 0.75rem; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div class="clicker-section">
        <div id="score-panel">
            <h1 id="score-text">0</h1>
            <p style="letter-spacing: 2px; margin: 5px 0;">LINCOLN MASS</p>
            <div style="font-size: 0.9rem; color: #ccc;">
                Bulk per Click: <span id="stat-click">1</span><br>
                Passive Gains: <span id="stat-cps">0</span>
            </div>
            <div id="sync-status">Vaulting...</div>
        </div>
        
        <img src="IMG_0668.jpg" id="lincoln-main" alt="Lincoln">
        
        <br>
        <button onclick="resetGame()" style="background:none; border:1px solid #444; color:#666; margin-top:30px; cursor:pointer; font-size: 0.7rem; padding: 5px 10px; border-radius: 5px;">Reset Progress</button>
    </div>

    <div class="shop-container" id="shop"></div>
</div>

<div id="chat-icon" onclick="toggleChat()">💬</div>

<div id="chat-box">
    <div style="background:var(--primary); padding: 10px; font-weight: bold; display: flex; justify-content: space-between;">
        <span>Global Chat</span>
        <span onclick="toggleChat()" style="cursor:pointer;">×</span>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
        <input type="text" id="chat-msg-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendChat()">
        <button onclick="sendChat()" style="background:var(--primary); border:none; color:white; border-radius:5px; padding:0 10px; cursor:pointer;">Send</button>
    </div>
</div>

<script>
    // --- DATABASE CONFIG ---
    const DB_URL = 'https://cnstrmbiosdykiqyxcua.supabase.co';
    const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc3RybWJpb3NkeWtpcXl4Y3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDEzMDEsImV4cCI6MjA4ODc3NzMwMX0.hf6kiAniU-Hw1J3xuYPK_xlUO9BLR3d5vkEq41uf8co';
    const _supabase = supabase.createClient(DB_URL, DB_KEY);

    let sessionId = localStorage.getItem('lincoln_session_id') || ('user_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('lincoln_session_id', sessionId);

    let energy = 0;
    let clickPower = 1;
    let cps = 0;
    let chatUsername = localStorage.getItem('chat_name');

    // Hard Scaling Upgrades
    const upgrades = [
        { id: 0, name: "Extra Torta", cost: 15, power: 0.1, type: "click", count: 0 },
        { id: 1, name: "Chud Burger", cost: 100, power: 0.3, type: "cps", count: 0 },
        { id: 2, name: "The Lard-o-Meter", cost: 500, power: 0.8, type: "cps", count: 0 },
        { id: 3, name: "Bulk Season", cost: 1200, power: 0.6, type: "click", count: 0 },
        { id: 4, name: "Torta Pounder 3000", cost: 3000, power: 2.5, type: "cps", count: 0 },
        { id: 5, name: "Infinite Buffet Pass", cost: 10000, power: 7.0, type: "cps", count: 0 },
        { id: 6, name: "Chudmosis", cost: 25000, power: 15.0, type: "cps", count: 0 },
        { id: 7, name: "Deep Fried Top Hat", cost: 85000, power: 50.0, type: "cps", count: 0 },
        { id: 8, name: "Torta Transfusion", cost: 200000, power: 12, type: "click", count: 0 },
        { id: 9, name: "Gravy Shower", cost: 500000, power: 150, type: "cps", count: 0 },
        { id: 10, name: "Mega-Chud Transformation", cost: 2000000, power: 500, type: "cps", count: 0 },
        { id: 11, name: "The Giga-Torta", cost: 8000000, power: 1500, type: "cps", count: 0 },
        { id: 12, name: "Sumo Lincoln", cost: 40000000, power: 1200, type: "click", count: 0 },
        { id: 13, name: "Event Horizon Gut", cost: 150000000, power: 18000, type: "cps", count: 0 },
        { id: 14, name: "The Final Chud-down", cost: 2500000000, power: 120000, type: "cps", count: 0 }
    ];

    function initShop() {
        const shop = document.getElementById('shop');
        shop.innerHTML = '';
        upgrades.forEach(u => {
            const btn = document.createElement('button');
            btn.className = 'upgrade';
            btn.id = `up-${u.id}`;
            btn.onclick = () => buyUpgrade(u.id);
            btn.innerHTML = `
                <div class="upgrade-info">
                    <span class="u-name">${u.name}</span>
                    <span class="u-cost" id="cost-${u.id}">${u.cost.toLocaleString()}</span> Mass
                    <small style="display:block; color:#aaa; font-style:italic;">+${u.power} per ${u.type === 'click' ? 'click' : 'sec'}</small>
                </div>
                <div id="count-${u.id}" style="font-size:1.4rem; font-weight:bold; color:var(--primary);">0</div>
            `;
            shop.appendChild(btn);
        });
    }

    document.getElementById('lincoln-main').addEventListener('click', (e) => {
        energy += clickPower;
        showParticle(e.clientX, e.clientY, `+${clickPower.toFixed(1)}`);
        updateUI();
    });

    function buyUpgrade(id) {
        const u = upgrades[id];
        if (energy >= u.cost) {
            energy -= u.cost;
            u.count++;
            if (u.type === "click") clickPower += u.power; else cps += u.power;
            u.cost = Math.ceil(u.cost * 1.35); 
            updateUI();
            cloudSave();
        }
    }

    function updateUI() {
        document.getElementById('score-text').innerText = Math.floor(energy).toLocaleString();
        document.getElementById('stat-click').innerText = clickPower.toFixed(1);
        document.getElementById('stat-cps').innerText = cps.toFixed(1);
        upgrades.forEach(u => {
            const btn = document.getElementById(`up-${u.id}`);
            if (btn) {
                btn.disabled = energy < u.cost;
                energy >= u.cost ? btn.classList.add('can-afford') : btn.classList.remove('can-afford');
                document.getElementById(`cost-${u.id}`).innerText = u.cost.toLocaleString();
                document.getElementById(`count-${u.id}`).innerText = u.count;
            }
        });
    }

    function showParticle(x, y, text) {
        const p = document.createElement('div');
        p.className = 'particle'; p.innerText = text;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }

    // --- CHAT & SYNC ---
    function toggleChat() {
        const box = document.getElementById('chat-box');
        box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        if (!chatUsername) {
            chatUsername = prompt("Name for Chat:");
            if (!chatUsername) chatUsername = "Lincoln_" + Math.floor(Math.random()*999);
            localStorage.setItem('chat_name', chatUsername);
        }
        if(box.style.display === 'flex') fetchMessages();
    }

    async function sendChat() {
        const input = document.getElementById('chat-msg-input');
        let text = input.value.trim();
        if (!text) return;
        
        // Very basic filter
        const bad = ["swear1", "swear2"]; 
        bad.forEach(w => text = text.replace(new RegExp(w, "gi"), "****"));
        
        input.value = "";
        await _supabase.from('global_chat').insert([{ username: chatUsername, message: text }]);
        fetchMessages();
    }

    async function fetchMessages() {
        const { data } = await _supabase.from('global_chat').select('*').order('created_at', { ascending: false }).limit(25);
        if (data) {
            document.getElementById('chat-messages').innerHTML = data.reverse().map(m => 
                `<div class="msg"><b>${m.username}:</b> ${m.message}</div>`).join('');
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }
    }

    async function cloudSave() {
        document.getElementById('sync-status').innerText = "Syncing...";
        const { error } = await _supabase.from('leaderboard').upsert({ username: sessionId, clicks: Math.floor(energy) }, { onConflict: 'username' });
        if (!error) {
            document.getElementById('sync-status').innerText = "Vaulted";
            localStorage.setItem('lincoln_bk', JSON.stringify({energy, clickPower, cps, counts: upgrades.map(u=>u.count), costs: upgrades.map(u=>u.cost)}));
        }
    }

    async function cloudLoad() {
        const local = localStorage.getItem('lincoln_bk');
        if (local) {
            const d = JSON.parse(local);
            energy = d.energy; clickPower = d.clickPower; cps = d.cps;
            d.counts?.forEach((c, i) => { if(upgrades[i]) upgrades[i].count = c; });
            d.costs?.forEach((c, i) => { if(upgrades[i]) upgrades[i].cost = c; });
            updateUI();
        }
        const { data } = await _supabase.from('leaderboard').select('*').eq('username', sessionId).maybeSingle();
        if (data && data.clicks > energy) { energy = data.clicks; updateUI(); }
        document.getElementById('sync-status').innerText = "Vault Connected";
    }

    function resetGame() { if(confirm("Erase all Mass?")) { localStorage.clear(); location.reload(); } }

    setInterval(() => { if (cps > 0) { energy += (cps / 10); updateUI(); } }, 100);
    setInterval(cloudSave, 20000);
    setInterval(() => { if(document.getElementById('chat-box').style.display === 'flex') fetchMessages(); }, 4000);

    initShop();
    cloudLoad();
</script>
</body>
</html>
