<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lincoln Clicker: Heavyweight Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --bg: #1e272e;
            --gold: #f1c40f;
            --chat-bg: #252a34;
            --card-bg: rgba(0, 0, 0, 0.7);
        }

        body {
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', sans-serif;
            background: #1e272e;
            color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            transition: background 1s ease-in-out;
        }

        /* Background Classes */
        .bg-kitchen { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1200'); background-size: cover; }
        .bg-buffet { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200'); background-size: cover; }
        .bg-factory { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&w=1200'); background-size: cover; }
        .bg-space { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200'); background-size: cover; }

        #main-container { display: flex; flex: 1; padding: 20px; gap: 20px; height: calc(100vh - 70px); box-sizing: border-box; }
        
        .view { display: none; flex: 1; flex-direction: column; animation: fadeIn 0.3s ease; }
        .view.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Clicker Section */
        .clicker-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        
        #lincoln-main {
            width: 280px; height: 280px; border-radius: 50%; cursor: pointer;
            object-fit: cover; border: 8px solid var(--secondary);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none; box-shadow: 0 0 30px rgba(108, 92, 231, 0.5);
        }
        #lincoln-main:active { transform: scale(0.92); }

        /* Navigation Bar */
        #nav-bar {
            height: 70px; background: #2d3436; display: flex; 
            justify-content: space-around; align-items: center;
            border-top: 2px solid var(--primary); z-index: 100;
        }
        .nav-item { cursor: pointer; opacity: 0.6; transition: 0.3s; text-align: center; font-size: 0.8rem; font-weight: bold; }
        .nav-item.active { opacity: 1; color: var(--primary); }

        /* Shop & Lists */
        .scroll-area { flex: 1; overflow-y: auto; padding-right: 10px; }
        .upgrade {
            width: 100%; background: var(--card-bg); border: 2px solid #444; border-radius: 12px;
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; transition: 0.2s; cursor: pointer; color: white;
        }
        .upgrade.can-afford { border-color: var(--gold); }
        .upgrade:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        /* Achievement Tiles */
        .achievement-card {
            background: var(--card-bg); padding: 15px; border-radius: 10px;
            margin-bottom: 10px; border-left: 5px solid #555; display: flex; align-items: center; gap: 15px;
        }
        .achievement-card.unlocked { border-left-color: var(--gold); }

        /* Admin & Chat */
        #admin-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #2f3542; border: 3px solid var(--gold); padding: 20px; border-radius: 15px;
            z-index: 10001; width: 300px; box-shadow: 0 0 50px #000;
        }
        #chat-window { width: 350px; background: var(--chat-bg); display: flex; flex-direction: column; border-left: 1px solid #444; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; }
        .msg { background: rgba(255,255,255,0.05); padding: 6px; border-radius: 6px; margin-bottom: 5px; }
        .king-msg { border-left: 3px solid var(--gold); background: rgba(241, 196, 15, 0.1); }
        .system-msg { border-left: 3px solid #ff4757; color: #ff4757; }

        .particle { position: fixed; pointer-events: none; animation: flyUp 0.8s forwards; font-weight: bold; color: var(--gold); z-index: 999; }
        @keyframes flyUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body class="bg-kitchen">

<div id="admin-trigger" onclick="openAdmin()" style="position:fixed; top:0; right:0; width:40px; height:40px; cursor:pointer; opacity:0.01; z-index:9999;"></div>

<div id="admin-panel">
    <h3 style="margin-top:0; color:var(--gold); text-align:center;">ADMIN CONTROL</h3>
    <input type="text" id="admin-target-user" style="width:100%; margin-bottom:10px;" placeholder="Username">
    <input type="text" id="admin-value" style="width:100%; margin-bottom:10px;" placeholder="Value">
    <button onclick="adminAction('mass')" style="width:100%; background:var(--gold); margin-bottom:5px;">Give Mass</button>
    <button onclick="clearChatNow()" style="width:100%; background:#ff4757; color:white; font-weight:bold;">FORCE CLEAR CHAT</button>
    <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; margin-top:10px; background:none; border:none; color:white;">Close</button>
</div>

<div id="main-container">
    <div id="view-game" class="view active">
        <div id="score-panel" style="text-align: center; background: var(--card-bg); padding: 20px; border-radius: 20px;">
            <h1 id="score-text" style="font-size: 3.5rem; margin: 0; color: var(--gold);">0</h1>
            <p id="env-label" style="font-size: 0.7rem; color: #aaa; margin: 5px 0;">LOCATION: THE KITCHEN</p>
            <div style="font-size: 0.85rem; color: #55efc4;">
                Per Click: <span id="stat-click">1</span> | Per Sec: <span id="stat-cps">0</span>
            </div>
            <div id="sync-status" style="font-size: 0.6rem; color: #666; margin-top: 5px;">Syncing...</div>
        </div>
        
        <div class="clicker-section">
            <img src="IMG_0668.jpg" id="lincoln-main">
            <button id="prestige-btn" style="display:none; margin-top:20px; background:var(--gold); padding:10px 20px; border-radius:10px; border:none; color:black; font-weight:bold; cursor:pointer;" onclick="prestige()">WEIGH IN (PRESTIGE)</button>
        </div>
    </div>

    <div id="view-shop" class="view">
        <h2 style="color:var(--primary)">Catering Store</h2>
        <div class="scroll-area" id="shop-list"></div>
    </div>

    <div id="view-achievements" class="view">
        <h2 style="color:var(--gold)">Trophies</h2>
        <div class="scroll-area" id="achievement-list"></div>
    </div>

    <div id="view-settings" class="view">
        <h2 style="color:#aaa">Settings</h2>
        <div class="scroll-area">
            <button onclick="changeName()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; margin-bottom:10px; cursor:pointer;">Change Chat Name</button>
            <button onclick="resetGame()" style="width:100%; padding:15px; background:#d63031; color:white; border:none; border-radius:10px; cursor:pointer;">HARD RESET ALL PROGRESS</button>
        </div>
    </div>

    <div id="chat-window">
        <div style="padding: 15px; background: var(--primary); font-weight: bold; display: flex; justify-content: space-between;">
            <span>Global Chat</span>
            <span id="king-display" style="color:var(--gold); font-size: 0.8rem;">👑 Loading...</span>
        </div>
        <div id="chat-msgs"></div>
        <div style="padding: 10px; display: flex; gap: 5px; background: #1a1e26;">
            <input type="text" id="chat-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendChat()" style="flex:1; padding:8px; border-radius:5px; border:none; background:#333; color:white;">
            <button onclick="sendChat()" style="background:var(--primary); border:none; color:white; border-radius:5px; padding:0 10px; cursor:pointer;">Send</button>
        </div>
    </div>
</div>

<div id="nav-bar">
    <div class="nav-item active" onclick="switchTab('game', this)">Game</div>
    <div class="nav-item" onclick="switchTab('shop', this)">Shop</div>
    <div class="nav-item" onclick="switchTab('achievements', this)">Trophies</div>
    <div class="nav-item" onclick="switchTab('settings', this)">Settings</div>
</div>

<script>
    const DB_URL = 'https://cnstrmbiosdykiqyxcua.supabase.co';
    const DB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNuc3RybWJpb3NkeWtpcXl4Y3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDEzMDEsImV4cCI6MjA4ODc3NzMwMX0.hf6kiAniU-Hw1J3xuYPK_xlUO9BLR3d5vkEq41uf8co';
    const _supabase = supabase.createClient(DB_URL, DB_KEY);

    let energy = 0, clickPower = 1, cps = 0, goldenTortas = 0, totalClicks = 0;
    let currentKing = "", chatName = localStorage.getItem('chat_name') || null;
    let isAdmin = false;

    // FULL RESTORED UPGRADE LIST
    const initialUpgrades = [
        { id: 0, name: "Extra Torta", cost: 15, power: 0.1, type: "click" },
        { id: 1, name: "Chud Burger", cost: 100, power: 0.3, type: "cps" },
        { id: 2, name: "The Lard-o-Meter", cost: 500, power: 0.8, type: "cps" },
        { id: 3, name: "Bulk Season", cost: 1200, power: 0.6, type: "click" },
        { id: 4, name: "Torta Pounder 3000", cost: 3000, power: 2.5, type: "cps" },
        { id: 5, name: "Infinite Buffet Pass", cost: 10000, power: 7.0, type: "cps" },
        { id: 6, name: "Chudmosis", cost: 25000, power: 15.0, type: "cps" },
        { id: 7, name: "Deep Fried Top Hat", cost: 85000, power: 50.0, type: "cps" },
        { id: 8, name: "Torta Transfusion", cost: 200000, power: 12, type: "click" },
        { id: 9, name: "Gravy Shower", cost: 500000, power: 150, type: "cps" },
        { id: 10, name: "Mega-Chud Transformation", cost: 2000000, power: 500, type: "cps" },
        { id: 11, name: "The Giga-Torta", cost: 8000000, power: 1500, type: "cps" },
        { id: 12, name: "Sumo Lincoln", cost: 40000000, power: 1200, type: "click" },
        { id: 13, name: "Event Horizon Gut", cost: 150000000, power: 18000, type: "cps" },
        { id: 14, name: "The Final Chud-down", cost: 2500000000, power: 120000, type: "cps" }
    ];
    let upgrades = initialUpgrades.map(u => ({...u, count: 0}));

    const achievementDefs = [
        { id: 'c100', name: "Fast Fingers", desc: "Click 100 times", goal: 100, type: 'clicks' },
        { id: 'm10k', name: "Weight Gainer", desc: "10,000 Mass", goal: 10000, type: 'mass' },
        { id: 'm1m', name: "Torta Titan", desc: "1 Million Mass", goal: 1000000, type: 'mass' },
        { id: 'm1b', name: "Ascended Chud", desc: "Reach 1 Billion Mass", goal: 1000000000, type: 'mass' }
    ];
    let unlockedAchievs = JSON.parse(localStorage.getItem('lincoln_achievs')) || [];

    function switchTab(tabId, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + tabId).classList.add('active');
        el.classList.add('active');
    }

    document.getElementById('lincoln-main').addEventListener('click', (e) => {
        let val = clickPower * (1 + (goldenTortas * 0.1));
        if (currentKing && chatName && chatName !== currentKing) val *= 0.99;
        energy += val; totalClicks++;
        showParticle(e.clientX, e.clientY, `+${val.toFixed(1)}`);
        updateUI();
        checkAchievements();
    });

    function buyUpgrade(id) {
        const u = upgrades.find(up => up.id === id);
        if (energy >= u.cost) {
            energy -= u.cost; u.count++;
            if (u.type === "click") clickPower += u.power; else cps += u.power;
            u.cost = Math.ceil(u.cost * 1.35);
            updateUI(); cloudSave();
        }
    }

    function updateUI() {
        document.getElementById('score-text').innerText = Math.floor(energy).toLocaleString();
        const bonus = (1 + (goldenTortas * 0.1));
        document.getElementById('stat-click').innerText = (clickPower * bonus).toFixed(1);
        document.getElementById('stat-cps').innerText = (cps * bonus).toFixed(1);
        document.getElementById('prestige-btn').style.display = energy >= 1000000000 ? 'block' : 'none';
        
        // Render Shop
        document.getElementById('shop-list').innerHTML = upgrades.map(u => `
            <button class="upgrade ${energy >= u.cost ? 'can-afford' : ''}" onclick="buyUpgrade(${u.id})" ${energy < u.cost ? 'disabled' : ''}>
                <div style="text-align:left">
                    <strong>${u.name}</strong><br>
                    <small style="color: #55efc4;">${u.cost.toLocaleString()} Mass</small>
                </div>
                <div style="font-size:1.2rem; font-weight:bold; opacity:0.7;">${u.count}</div>
            </button>
        `).join('');

        // Render Achievs
        document.getElementById('achievement-list').innerHTML = achievementDefs.map(a => `
            <div class="achievement-card ${unlockedAchievs.includes(a.id) ? 'unlocked' : ''}">
                <div>
                    <strong>${unlockedAchievs.includes(a.id) ? '🏆' : '🔒'} ${a.name}</strong><br>
                    <small>${a.desc}</small>
                </div>
            </div>
        `).join('');

        // Environment Backgrounds
        const body = document.body;
        if (energy < 100000) body.className = 'bg-kitchen';
        else if (energy < 10000000) body.className = 'bg-buffet';
        else if (energy < 1000000000) body.className = 'bg-factory';
        else body.className = 'bg-space';
    }

    function checkAchievements() {
        achievementDefs.forEach(a => {
            if (!unlockedAchievs.includes(a.id)) {
                if ((a.type === 'clicks' && totalClicks >= a.goal) || (a.type === 'mass' && energy >= a.goal)) {
                    unlockedAchievs.push(a.id);
                    localStorage.setItem('lincoln_achievs', JSON.stringify(unlockedAchievs));
                }
            }
        });
    }

    async function cloudSave() {
        const save = { energy, clickPower, cps, goldenTortas, totalClicks, upgrades: upgrades.map(u => ({id:u.id, count:u.count, cost:u.cost})) };
        localStorage.setItem('lincoln_local_save', JSON.stringify(save));
        if (chatName) {
            await _supabase.from('leaderboard').upsert({ username: chatName, clicks: Math.floor(energy), golden_tortas: goldenTortas }, { onConflict: 'username' });
            document.getElementById('sync-status').innerText = "Vault Synchronized";
        }
    }

    function loadGame() {
        const d = JSON.parse(localStorage.getItem('lincoln_local_save'));
        if (d) {
            energy = d.energy || 0; clickPower = d.clickPower || 1; cps = d.cps || 0; 
            goldenTortas = d.goldenTortas || 0; totalClicks = d.totalClicks || 0;
            d.upgrades?.forEach(savedU => {
                let u = upgrades.find(up => up.id === savedU.id);
                if (u) { u.count = savedU.count; u.cost = savedU.cost; }
            });
        }
        updateUI(); checkAdminStatus();
    }

    async function checkAdminStatus() {
        if (!chatName) return;
        const { data } = await _supabase.from('leaderboard').select('is_admin').eq('username', chatName).maybeSingle();
        if (data?.is_admin) isAdmin = true;
    }

    function openAdmin() { if(isAdmin) document.getElementById('admin-panel').style.display='block'; }

    async function adminAction(type) {
        const target = document.getElementById('admin-target-user').value;
        const valText = document.getElementById('admin-value').value;
        if (type === 'mass') {
            const amount = parseFloat(valText);
            if (target === chatName) { energy += amount; updateUI(); cloudSave(); }
            else { await _supabase.from('leaderboard').update({ clicks: amount }).eq('username', target); }
            alert("Mass Injected.");
        }
    }

    async function clearChatNow() {
        if (!isAdmin) return;
        const { error } = await _supabase.from('global_chat').delete().gt('id', 0);
        if (!error) {
            await _supabase.from('global_chat').insert([{ username: "SYSTEM", message: "--- Database Purge Successful ---" }]);
            fetchMessages();
        }
    }

    async function sendChat() {
        if (!chatName) {
            chatName = prompt("Enter Chat Name:");
            if (!chatName) return;
            localStorage.setItem('chat_name', chatName);
            checkAdminStatus();
        }
        const input = document.getElementById('chat-input');
        if (!input.value) return;
        await _supabase.from('global_chat').insert([{ username: chatName, message: input.value }]);
        input.value = ""; fetchMessages();
    }

    async function fetchMessages() {
        const { data } = await _supabase.from('global_chat').select('*').order('created_at', { ascending: false }).limit(25);
        if (data) {
            document.getElementById('chat-msgs').innerHTML = data.reverse().map(m => `
                <div class="msg ${m.username === 'SYSTEM' ? 'system-msg' : (m.username === currentKing ? 'king-msg' : '')}">
                    <b>${m.username}:</b> ${m.message}
                </div>`).join('');
            const c = document.getElementById('chat-msgs'); c.scrollTop = c.scrollHeight;
        }
    }

    async function fetchKing() {
        const { data } = await _supabase.from('king_of_the_hill').select('*').maybeSingle();
        if (data) { currentKing = data.username; document.getElementById('king-display').innerText = `👑 King: ${data.username}`; }
    }

    function showParticle(x, y, text) {
        const p = document.createElement('div'); p.className = 'particle'; p.innerText = text;
        p.style.left = x + 'px'; p.style.top = y + 'px';
        document.body.appendChild(p); setTimeout(() => p.remove(), 800);
    }

    function resetGame() { if(confirm("Hard Reset everything?")) { localStorage.clear(); location.reload(); } }
    function changeName() { const n = prompt("New name?"); if(n) { chatName = n; localStorage.setItem('chat_name', n); checkAdminStatus(); updateUI(); } }

    setInterval(() => { energy += (cps * (1 + (goldenTortas * 0.1)) / 10); updateUI(); }, 100);
    setInterval(cloudSave, 15000);
    setInterval(fetchMessages, 4000);
    setInterval(fetchKing, 10000);

    loadGame();
    fetchMessages();
    fetchKing();
</script>
</body>
</html>
